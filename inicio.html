<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Início · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <style>.bars { display: flex; align-items: flex-end; gap: 8px; height: 200px; margin: 20px 0; } .bar { background: #1e3c72; border-radius: 4px 4px 0 0; transition: height 0.3s; } .col { flex: 1; text-align: center; } .lbl { margin-top: 8px; font-size: 11px; color: #64748b; } .rank-row { margin-bottom: 16px; } .rank-head { display: flex; justify-content: space-between; margin-bottom: 6px; } .bar-track { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; } .bar-fill { height: 100%; background: #1e3c72; border-radius: 10px; }</style>
</head>
<body>
  <div class="app"><div id="sidebar-slot"></div>
    <main>
      <div class="page-header"><h1>Início</h1></div>
      <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px;">
        <div class="card stat"><div><div class="label">Obras</div><div class="value" id="stat-obras">0</div></div><div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h.01M15 8h.01"/></svg></div></div>
        <div class="card stat"><div><div class="label">Funcionários</div><div class="value" id="stat-func">0</div></div><div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg></div></div>
      </div>
      <div class="card" style="margin-bottom: 24px;"><h3>Funcionários contratados por mês (2026)</h3><div class="bars" id="bars"></div></div>
      <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 20px;">
        <div class="card"><h3>Ranking de Funções</h3><div id="rank"></div></div>
        <div class="card"><h3>Ranking de Setores</h3><div id="rankSetor"></div></div>
      </div>
    </main>
  </div>
  <script type="module">import { mountLayout, renderInicio } from './app.js'; mountLayout('inicio'); await renderInicio();</script>
</body>
</html>
