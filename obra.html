<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalhe da Obra · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .stats-panel { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .stat-card { flex: 1; min-width: 100px; background: white; border-radius: 12px; padding: 12px 16px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
    .stat-card.active { background: #eef2ff; border-color: #3b82f6; }
    .stat-card .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: #0f172a; }
    .btn-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters-bar { display: flex; gap: 16px; margin-bottom: 20px; align-items: flex-end; }
    .filters-bar .search { flex: 2; min-width: 200px; position: relative; }
    .filters-bar .search input { padding-left: 32px; width: 100%; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; }
    .close { float: right; font-size: 24px; cursor: pointer; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 500; }
    .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
    .dialog-foot { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <a href="obras.html" class="back-link">← Voltar para obras</a>
      <h1 id="obraNome">Carregando...</h1>

      <!-- Cards de filtro -->
      <div class="stats-panel" id="statsPanel"></div>

      <!-- Botões de ação -->
      <div class="btn-group">
        <button class="btn" id="importarBtn">📥 Importar Planilha</button>
        <button class="btn" id="exportarBtn">📤 Exportar Dados</button>
        <button class="btn btn-danger" id="apagarTodosBtn">🗑️ Apagar Todos</button>
      </div>

      <!-- Barra de busca -->
      <div class="filters-bar">
        <div class="search">
          <svg style="position:absolute; left:10px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:#94a3b8" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="searchInput" class="input" type="text" placeholder="Buscar funcionário por nome ou cargo">
        </div>
      </div>

      <!-- Tabela de funcionários -->
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr><th>RE</th><th>Nome</th><th>Cargo</th><th>Setor</th><th>Tipo Vínculo</th><th>Admissão</th><th>Situação</th><th>Ações</th></tr>
          </thead>
          <tbody id="tbodyFuncionarios"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal Novo Funcionário -->
  <div id="modalFuncionario" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModalFuncionario()">&times;</span>
      <h3>Novo Funcionário</h3>
      <form id="formFuncionario">
        <div class="field"><label>RE</label><input type="text" id="re" class="input"></div>
        <div class="field"><label>Nome *</label><input type="text" id="nome" class="input" required></div>
        <div class="field"><label>Cargo *</label><input type="text" id="cargo" class="input" required></div>
        <div class="field"><label>Setor</label><select id="setor" class="select"><option>Operacional</option><option>ADM</option></select></div>
        <div class="field"><label>Tipo Vínculo</label><select id="tipoVinculo" class="select"><option>Efetivo</option><option>PJ</option><option>Terceiros</option><option>Mobilização</option><option>Alteração de Função</option></select></div>
        <div class="field"><label>Data Admissão</label><input type="date" id="dataAdmissao" class="input"></div>
        <div class="field"><label>Situação</label><select id="situacao" class="select"><option>Ativo</option><option>Aguarda Exame</option><option>Inativo</option></select></div>
        <div class="dialog-foot"><button type="submit" class="btn">Salvar</button><button type="button" class="btn btn-outline" onclick="fecharModalFuncionario()">Cancelar</button></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { mountLayout, getObras, getFuncionarios, addFuncionario, deleteFuncionario } from './app.js';
    
    mountLayout('obras');
    
    const urlParams = new URLSearchParams(window.location.search);
    const obraId = urlParams.get('id');
    let obra = null;
    let todosFuncionarios = [];
    
    const obras = await getObras();
    obra = obras.find(o => o.id === obraId);
    if (obra) document.getElementById('obraNome').innerText = obra.nome;
    else document.getElementById('obraNome').innerText = 'Obra não encontrada';
    
    async function carregarFuncionarios() {
      todosFuncionarios = await getFuncionarios(obraId);
      renderizarCards(todosFuncionarios);
      renderizarTabela(todosFuncionarios);
    }
    
    function renderizarCards(funcionarios) {
      const tipos = {
        'Total Geral': funcionarios.length,
        'Efetivos': funcionarios.filter(f => f.tipoVinculo === 'Efetivo').length,
        'PJ': funcionarios.filter(f => f.tipoVinculo === 'PJ').length,
        'Operacional': funcionarios.filter(f => f.setor === 'Operacional').length,
        'ADM': funcionarios.filter(f => f.setor === 'ADM').length,
        'Mobilização': funcionarios.filter(f => f.tipoVinculo === 'Mobilização').length,
        'Alteração de Função': funcionarios.filter(f => f.tipoVinculo === 'Alteração de Função').length,
        'Terceiros': funcionarios.filter(f => f.tipoVinculo === 'Terceiros').length
      };
      const panel = document.getElementById('statsPanel');
      panel.innerHTML = '';
      for (const [label, value] of Object.entries(tipos)) {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = '<div class="label">' + label + '</div><div class="value">' + value + '</div>';
        card.onclick = () => filtrarPorCategoria(label);
        panel.appendChild(card);
      }
    }
    
    function filtrarPorCategoria(categoria) {
      let filtrados;
      switch(categoria) {
        case 'Efetivos': filtrados = todosFuncionarios.filter(f => f.tipoVinculo === 'Efetivo'); break;
        case 'PJ': filtrados = todosFuncionarios.filter(f => f.tipoVinculo === 'PJ'); break;
        case 'Operacional': filtrados = todosFuncionarios.filter(f => f.setor === 'Operacional'); break;
        case 'ADM': filtrados = todosFuncionarios.filter(f => f.setor === 'ADM'); break;
        case 'Mobilização': filtrados = todosFuncionarios.filter(f => f.tipoVinculo === 'Mobilização'); break;
        case 'Alteração de Função': filtrados = todosFuncionarios.filter(f => f.tipoVinculo === 'Alteração de Função'); break;
        case 'Terceiros': filtrados = todosFuncionarios.filter(f => f.tipoVinculo === 'Terceiros'); break;
        default: filtrados = todosFuncionarios;
      }
      renderizarTabela(filtrados);
    }
    
    function renderizarTabela(funcionarios) {
      const tbody = document.getElementById('tbodyFuncionarios');
      tbody.innerHTML = funcionarios.map(f => `
        <tr>
          <td class="cell-strong">${f.re || '-'}】,
          <td class="cell-strong">${f.nome || ''}】,
          <td class="cell-muted">${f.cargo || ''}】,
          <td class="cell-muted">${f.setor || '-'}】,
          <td class="cell-muted">${f.tipoVinculo || '-'}】,
          <td class="cell-muted">${f.dataAdmissao ? new Date(f.dataAdmissao).toLocaleDateString() : '-'}】,
          <td class="cell-muted"><span class="badge ${f.situacao === 'Ativo' ? 'on' : ''}">${f.situacao || 'Ativo'}</span>】,
          <td class="cell-muted">
            <button class="btn btn-sm btn-warning" onclick="editarFuncionario('${f.id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluirFuncionario('${f.id}')">Excluir</button>
          </td>,
        </tr>
      `).join('');
      if (funcionarios.length === 0) tbody.innerHTML = '<tr><td colspan="8" class="cell-muted" style="text-align:center">Nenhum funcionário cadastrado】,</tr>';
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      const filtrados = todosFuncionarios.filter(f => 
        (f.nome && f.nome.toLowerCase().includes(termo)) || 
        (f.cargo && f.cargo.toLowerCase().includes(termo))
      );
      renderizarTabela(filtrados);
      renderizarCards(filtrados);
    });
    
    // Modal
    const modal = document.getElementById('modalFuncionario');
    window.fecharModalFuncionario = () => modal.style.display = 'none';
    document.getElementById('importarBtn').onclick = () => alert('Importação em breve');
    document.getElementById('exportarBtn').onclick = () => alert('Exportação em breve');
    document.getElementById('apagarTodosBtn').onclick = () => {
      if (confirm('Excluir TODOS os funcionários desta obra?')) {
        alert('Função será implementada');
      }
    };
    
    document.getElementById('formFuncionario').addEventListener('submit', async (e) => {
      e.preventDefault();
      const funcionario = {
        re: document.getElementById('re').value,
        nome: document.getElementById('nome').value,
        cargo: document.getElementById('cargo').value,
        setor: document.getElementById('setor').value,
        tipoVinculo: document.getElementById('tipoVinculo').value,
        dataAdmissao: document.getElementById('dataAdmissao').value,
        situacao: document.getElementById('situacao').value,
        obraId: obraId,
        ativo: true
      };
      await addFuncionario(funcionario);
      modal.style.display = 'none';
      document.getElementById('formFuncionario').reset();
      await carregarFuncionarios();
    });
    
    window.excluirFuncionario = async (id) => {
      if (confirm('Excluir este funcionário?')) {
        await deleteFuncionario(id);
        await carregarFuncionarios();
      }
    };
    
    window.editarFuncionario = (id) => alert('Edição em breve');
    
    await carregarFuncionarios();
  </script>
</body>
</html>
