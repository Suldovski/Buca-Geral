<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detalhe da Obra · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <a href="obras.html" class="back-link">← Voltar</a>
      <h1 id="obraNome">Carregando...</h1>
      <div class="table-wrap"><table style="width:100%"><thead><tr><th>Nome</th><th>Cargo</th><th>Ações</th></tr></thead><tbody id="tbodyFuncionarios"></tbody><tr></div>
    </main>
  </div>
  <script type="module">
    import { mountLayout, getObras, getFuncionarios } from './app.js';
    mountLayout('obras');
    const id = new URLSearchParams(location.search).get('id');
    const obras = await getObras();
    const obra = obras.find(o => o.id === id);
    if (obra) document.getElementById('obraNome').innerText = obra.nome;
    const funcs = await getFuncionarios(id);
    const tbody = document.getElementById('tbodyFuncionarios');
    tbody.innerHTML = funcs.map(f => '<tr><td>' + (f.nome || '') + '</td><td>' + (f.cargo || '') + '</td><td><button class="btn btn-sm btn-warning">Editar</button></td></tr>').join('');
  </script>
</body>
</html>
