<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funcionários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header"><h1>Funcionários</h1><button class="btn" id="novoFuncBtn">+ Novo Funcionário</button></div>

      <div class="stats-panel" id="cardsPanel"></div>

      <div class="filters-bar filters-grid">
        <input id="searchInput" class="input" placeholder="Buscar por nome, função ou RE">
        <select id="obraFilter" class="select"><option value="">Todas as obras</option></select>
        <button class="btn btn-import" id="importarBtn">📥 Importar Planilha</button>
        <button class="btn btn-outline" id="exportarCsvBtn">Exportar CSV</button>
        <button class="btn btn-danger" id="apagarTodosBtn">🗑️ Apagar Todos</button>
      </div>

      <input id="importFile" type="file" accept=".csv,.xlsx,.xls" hidden>

      <div class="exp-legend">
        <span class="exp-legend-item"><span class="exp-dot exp-critical"></span> Vencido</span>
        <span class="exp-legend-item"><span class="exp-dot exp-warn"></span> Vence em ≤ 30 dias</span>
        <span class="exp-legend-item"><span class="exp-dot exp-caution"></span> Vence em ≤ 60 dias</span>
      </div>

      <div class="table-wrap">
        <table class="table-fit">
          <thead><tr><th>RE</th><th>Nome</th><th>CPF</th><th>Função</th><th>Setor</th><th>Tipo Vínculo</th><th>Situação</th><th>Admissão</th><th>Nascimento</th><th>CBO</th><th>Exp.30</th><th>Exp.60</th><th>Venc. ASO</th><th>Salário/Hora</th><th>Salário/Mês</th><th>Obra</th><th>Ações</th></tr></thead>
          <tbody id="tbodyFuncionarios"></tbody>
        </table>
      </div>

      <div class="grid grid-2" style="margin-top:20px;">
        <div class="card"><h3>Ranking de cargos</h3><div id="rankingCargos" class="list-stack"></div></div>
        <div class="card"><h3>Ranking de setores</h3><div id="rankingSetores" class="list-stack"></div></div>
      </div>
    </main>
  </div>

  <div id="modalFunc" class="modal">
    <div class="modal-content" style="max-width:900px;">
      <h3 id="funcModalTitle">Novo Funcionário</h3>
      <form id="formFunc" class="form-grid">
        <div class="field"><label for="re">RE</label><input id="re" class="input"></div>
        <div class="field"><label for="nome">Nome</label><input id="nome" class="input" required></div>
        <div class="field"><label for="cpf">CPF</label><input id="cpf" class="input"></div>
        <div class="field"><label for="funcao">Função</label><input id="funcao" class="input" required></div>
        <div class="field"><label for="setor">Setor</label><select id="setor" class="select"><option>Operacional</option><option>ADM</option></select></div>
        <div class="field"><label for="tipoVinculo">Tipo vínculo</label><select id="tipoVinculo" class="select"><option>Efetivo</option><option>PJ</option><option>Terceiros</option><option>Mobilização</option><option>Alteração de Função</option></select></div>
        <div class="field"><label for="situacao">Situação</label><select id="situacao" class="select"><option>Ativo</option><option>Aguarda Exame</option><option>Inativo</option></select></div>
        <div class="field"><label for="obraId">Obra</label><select id="obraId" class="select" required></select></div>
        <div class="field"><label for="dataAdmissao">Data Admissão</label><input id="dataAdmissao" type="date" class="input"></div>
        <div class="field"><label for="nascimento">Data Nascimento</label><input id="nascimento" type="date" class="input"></div>
        <div class="field"><label for="cbo">CBO</label><input id="cbo" class="input"></div>
        <div class="field"><label for="exp30">Exp.30</label><input id="exp30" type="date" class="input"></div>
        <div class="field"><label for="exp60">Exp.60</label><input id="exp60" type="date" class="input"></div>
        <div class="field"><label for="asoVencimento">Vencimento ASO</label><input id="asoVencimento" type="date" class="input"></div>
        <div class="field"><label for="salarioHora">Salário/Hora</label><input id="salarioHora" type="number" step="0.01" class="input"></div>
        <div class="field"><label for="salarioMes">Salário/Mês</label><input id="salarioMes" type="number" step="0.01" class="input"></div>
        <div class="dialog-foot">
          <button type="button" class="btn btn-outline" id="cancelarFuncBtn">Cancelar</button>
          <button type="submit" class="btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modalImport" class="modal">
    <div class="modal-content" style="max-width:1000px;">
      <h3>Preview da importação</h3>
      <p id="importResumo" class="cell-muted" style="margin:8px 0 14px;"></p>
      <div class="table-wrap" style="max-height:320px;">
        <table>
          <thead><tr><th>RE</th><th>Nome</th><th>Função</th><th>Obra</th><th>Status</th></tr></thead>
          <tbody id="importPreviewBody"></tbody>
        </table>
      </div>
      <div class="dialog-foot">
        <button class="btn btn-outline" id="cancelarImportBtn">Cancelar</button>
        <button class="btn" id="confirmarImportBtn">Confirmar Importação</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script type="module">
    import {
      mountLayout,
      subscribeObras,
      subscribeFuncionarios,
      addFuncionario,
      updateFuncionario,
      deleteFuncionario,
      exportarCSV,
      escapeHtml,
      formatarDataBR,
      formatarMoeda,
      normalizarFuncionario,
      obterContagensCards,
      calcularRanking,
      getUsuarioLogado,
      filtrarObrasPorAcesso,
      filtrarFuncionariosPorAcesso,
      isRhMatriz,
      dataVencCell
    } from './app.js';

    mountLayout('funcionarios');

    const CARD_DEFS = [
      { key: 'total', label: 'Total Geral', fn: () => true },
      { key: 'efetivo', label: 'Efetivos', fn: (f) => f.tipoVinculo === 'Efetivo' },
      { key: 'pj', label: 'PJ', fn: (f) => f.tipoVinculo === 'PJ' },
      { key: 'operacional', label: 'Operacional', fn: (f) => f.setor === 'Operacional' },
      { key: 'adm', label: 'ADM', fn: (f) => f.setor === 'ADM' },
      { key: 'mobilizacao', label: 'Mobilização', fn: (f) => f.tipoVinculo === 'Mobilização' },
      { key: 'alteracao', label: 'Alteração de Função', fn: (f) => f.tipoVinculo === 'Alteração de Função' },
      { key: 'terceiros', label: 'Terceiros', fn: (f) => f.tipoVinculo === 'Terceiros' }
    ];

    const tbody = document.getElementById('tbodyFuncionarios');
    const cardsPanel = document.getElementById('cardsPanel');
    const modal = document.getElementById('modalFunc');
    const form = document.getElementById('formFunc');

    let obras = [];
    let funcionarios = [];
    let filtrados = [];
    let editandoId = null;
    let filtroCard = 'total';
    let previewImportacao = [];
    const usuarioLogado = getUsuarioLogado();
    const usuarioRhMatriz = isRhMatriz(usuarioLogado);

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    function preencherSelectObras() {
      document.getElementById('obraFilter').innerHTML = '<option value="">Todas as obras</option>' + obras.map((o) => `<option value="${o.id}">${escapeHtml(o.nome)}</option>`).join('');
      document.getElementById('obraId').innerHTML = obras.map((o) => `<option value="${o.id}">${escapeHtml(o.nome)}</option>`).join('');
      if (!usuarioRhMatriz && obras[0]) {
        document.getElementById('obraFilter').value = obras[0].id;
        document.getElementById('obraFilter').disabled = true;
      }
    }

    function renderCards(base) {
      const contagens = obterContagensCards(base);
      cardsPanel.innerHTML = CARD_DEFS.map((c) => `
        <button class="stat-card ${filtroCard === c.key ? 'active' : ''}" data-card="${c.key}">
          <div class="label">${c.label}</div>
          <div class="value">${contagens[c.key] || 0}</div>
        </button>
      `).join('');
    }

    function renderRankings(base) {
      const cargo = calcularRanking(base, 'funcao', 5);
      const setor = calcularRanking(base, 'setor', 5);
      document.getElementById('rankingCargos').innerHTML = cargo.length ? cargo.map(([k, v]) => `<div class="list-row"><span>${escapeHtml(k)}</span><strong>${v}</strong></div>`).join('') : '<p class="cell-muted">Sem dados.</p>';
      document.getElementById('rankingSetores').innerHTML = setor.length ? setor.map(([k, v]) => `<div class="list-row"><span>${escapeHtml(k)}</span><strong>${v}</strong></div>`).join('') : '<p class="cell-muted">Sem dados.</p>';
    }

    function aplicarFiltros() {
      const termo = document.getElementById('searchInput').value.trim().toLowerCase();
      const obraId = document.getElementById('obraFilter').value;
      const card = CARD_DEFS.find((c) => c.key === filtroCard) || CARD_DEFS[0];

      filtrados = funcionarios.filter((f) => {
        const matchBusca = !termo || (f.nome || '').toLowerCase().includes(termo) || (f.funcao || '').toLowerCase().includes(termo) || (f.re || '').toLowerCase().includes(termo) || (f.cpf || '').toLowerCase().includes(termo);
        const matchObra = !obraId || f.obraId === obraId;
        return matchBusca && matchObra && card.fn(f);
      });

      renderCards(funcionarios.filter((f) => !obraId || f.obraId === obraId));
      renderTabela();
      renderRankings(filtrados);
    }

    function renderTabela() {
      tbody.innerHTML = filtrados.map((f) => {
        const obraNome = obras.find((o) => o.id === f.obraId)?.nome || '-';
        return `<tr>
          <td>${escapeHtml(f.re || '-')}</td>
          <td class="cell-strong">${escapeHtml(f.nome || '-')}</td>
          <td>${escapeHtml(f.cpf || '-')}</td>
          <td>${escapeHtml(f.funcao || '-')}</td>
          <td>${escapeHtml(f.setor || '-')}</td>
          <td>${escapeHtml(f.tipoVinculo || '-')}</td>
          <td><span class="badge ${f.situacao === 'Ativo' ? 'on' : ''}">${escapeHtml(f.situacao || 'Ativo')}</span></td>
          <td>${formatarDataBR(f.dataAdmissao)}</td>
          <td>${formatarDataBR(f.nascimento)}</td>
          <td>${escapeHtml(f.cbo || '-')}</td>
          ${dataVencCell(f.exp30, formatarDataBR)}
          ${dataVencCell(f.exp60, formatarDataBR)}
          ${dataVencCell(f.asoVencimento, formatarDataBR)}
          <td>${formatarMoeda(f.salarioHora)}</td>
          <td>${formatarMoeda(f.salarioMes)}</td>
          <td>${escapeHtml(obraNome)}</td>
          <td>
            <div class="action-group">
              <button class="btn btn-sm btn-warning action-btn" title="Editar" data-edit="${f.id}">✏️</button>
              <button class="btn btn-sm btn-danger action-btn" title="Apagar" data-del="${f.id}">🗑️</button>
            </div>
          </td>
        </tr>`;
      }).join('');

      if (!filtrados.length) tbody.innerHTML = '<tr><td colspan="17" style="text-align:center">Nenhum funcionário encontrado.</td></tr>';
    }

    function abrirModal(func = null) {
      if (!obras.length) {
        showToast('Cadastre uma obra antes de cadastrar funcionários.', 'error');
        return;
      }
      editandoId = func?.id || null;
      document.getElementById('funcModalTitle').textContent = func ? 'Editar Funcionário' : 'Novo Funcionário';
      document.getElementById('re').value = func?.re || '';
      document.getElementById('nome').value = func?.nome || '';
      document.getElementById('cpf').value = func?.cpf || '';
      document.getElementById('funcao').value = func?.funcao || '';
      document.getElementById('setor').value = func?.setor || 'Operacional';
      document.getElementById('tipoVinculo').value = func?.tipoVinculo || 'Efetivo';
      document.getElementById('situacao').value = func?.situacao || 'Ativo';
      document.getElementById('obraId').value = func?.obraId || obras[0]?.id || '';
      document.getElementById('dataAdmissao').value = func?.dataAdmissao || '';
      document.getElementById('nascimento').value = func?.nascimento || '';
      document.getElementById('cbo').value = func?.cbo || '';
      document.getElementById('exp30').value = func?.exp30 || '';
      document.getElementById('exp60').value = func?.exp60 || '';
      document.getElementById('asoVencimento').value = func?.asoVencimento || '';
      document.getElementById('salarioHora').value = func?.salarioHora || '';
      document.getElementById('salarioMes').value = func?.salarioMes || '';
      modal.style.display = 'flex';
    }

    function fecharModal() {
      modal.style.display = 'none';
      form.reset();
      editandoId = null;
    }

    function normalizarCabecalho(valor) {
      return String(valor || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function normalizarTexto(valor) {
      return String(valor || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim().toUpperCase();
    }

    function normalizarReBruto(valor) {
      return normalizarTexto(valor).replace(/\s+/g, '');
    }

    function normalizarRe(valor) {
      const re = normalizarReBruto(valor);
      if (!re || re === 'PJ' || re === 'ASO') return '';
      return re;
    }

    function isRePJ(valor) {
      return normalizarReBruto(valor).includes('PJ');
    }

    function isReASO(valor) {
      return normalizarReBruto(valor).includes('ASO');
    }

    function normalizarSituacao(valor, re = '') {
      const texto = normalizarTexto(valor);
      if (!texto || texto === 'ATIVO') {
        return isReASO(re) ? 'Aguarda Exame' : 'Ativo';
      }
      if (texto.includes('AGUARDA EXAME')) return 'Aguarda Exame';
      if (texto.includes('INATIVO')) return 'Inativo';
      return 'Ativo';
    }

    function parseNumber(value) {
      const normalized = String(value ?? '').replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, '');
      if (!normalized) return 0;
      const n = Number(normalized);
      return Number.isFinite(n) ? n : 0;
    }

    function parseDate(value) {
      if (!value) return '';
      if (typeof value === 'number' && Number.isFinite(value)) {
        const parsed = XLSX.SSF.parse_date_code(value);
        if (parsed) {
          const month = String(parsed.m).padStart(2, '0');
          const day = String(parsed.d).padStart(2, '0');
          return `${parsed.y}-${month}-${day}`;
        }
      }
      if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().slice(0, 10);
      const text = String(value).trim();
      if (!text) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
      const m = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
      const d = new Date(text);
      return Number.isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10);
    }

    function parseCSV(texto) {
      const linhas = texto.split(/\r?\n/).filter((l) => l.trim());
      if (!linhas.length) return [];
      const sep = (linhas[0].match(/;/g) || []).length > (linhas[0].match(/,/g) || []).length ? ';' : ',';
      const headers = linhas[0].split(sep).map((h) => h.trim());
      return linhas.slice(1).map((linha) => {
        const cols = linha.split(sep);
        const item = {};
        headers.forEach((h, i) => { item[h] = (cols[i] || '').trim(); });
        return item;
      });
    }

    function localizarLinhaCabecalho(matriz) {
      const limite = Math.min(matriz.length, 25);
      for (let i = 0; i < limite; i += 1) {
        const normalizadas = (matriz[i] || []).map((celula) => normalizarCabecalho(celula));
        const temNome = normalizadas.includes('nome');
        const temFuncao = normalizadas.includes('funcao') || normalizadas.includes('cargo');
        if (temNome && temFuncao) return i;
      }
      return -1;
    }

    function montarObjetosDaMatriz(matriz) {
      if (!matriz.length) return [];
      const linhaCabecalho = localizarLinhaCabecalho(matriz);
      if (linhaCabecalho < 0) {
        throw new Error('Cabeçalho inválido. Inclua as colunas NOME e FUNÇÃO (ou CARGO).');
      }

      const headers = (matriz[linhaCabecalho] || []).map((h) => String(h || '').trim());
      const linhas = [];
      for (let i = linhaCabecalho + 1; i < matriz.length; i += 1) {
        const cols = matriz[i] || [];
        const item = {};
        let temConteudo = false;
        headers.forEach((h, index) => {
          if (!h) return;
          const valor = cols[index] ?? '';
          if (String(valor).trim() !== '') temConteudo = true;
          item[h] = valor;
        });
        if (temConteudo) linhas.push(item);
      }
      return linhas;
    }

    async function parsePlanilha(file) {
      if (file.name.toLowerCase().endsWith('.csv')) {
        return parseCSV(await file.text());
      }
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const matriz = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });
      return montarObjetosDaMatriz(matriz);
    }

    function obraIdFromLinha(linha) {
      const obraId = String(linha.obraId || '').trim();
      if (obraId && obras.some((o) => o.id === obraId)) return obraId;
      const obraNome = String(linha.obra || linha.nomeObra || '').trim().toLowerCase();
      if (!obraNome) return '';
      return obras.find((o) => (o.nome || '').trim().toLowerCase() === obraNome)?.id || '';
    }

    function mapearLinha(raw) {
      const row = {};
      Object.entries(raw).forEach(([k, v]) => {
        row[normalizarCabecalho(k)] = v;
      });

      const resolver = (...keys) => {
        for (const key of keys) {
          if (row[key] !== undefined && String(row[key]).trim() !== '') return row[key];
        }
        return '';
      };

      const reOriginal = String(resolver('re')).trim();
      const funcao = String(resolver('funcao', 'cargo')).trim();
      const obraId = obraIdFromLinha({
        obraId: resolver('obraid'),
        obra: resolver('obra'),
        nomeObra: resolver('nomeobra')
      });
      const situacao = normalizarSituacao(resolver('situacao'), reOriginal);
      const funcionario = {
        re: reOriginal,
        nome: String(resolver('nome')).trim(),
        cpf: String(resolver('cpf')).trim(),
        funcao,
        cargo: funcao,
        setor: String(resolver('setor')).trim() || 'Operacional',
        tipoVinculo: String(resolver('tipovinculo')).trim() || (isRePJ(reOriginal) ? 'PJ' : 'Efetivo'),
        situacao,
        dataAdmissao: parseDate(resolver('datadeadmissao', 'dataadmissao')),
        nascimento: parseDate(resolver('datanasc', 'datanascimento', 'nascimento')),
        cbo: String(resolver('cbo')).trim(),
        exp30: parseDate(resolver('30diasexp30', 'exp30')),
        exp60: parseDate(resolver('60diasexp60', 'exp60')),
        asoVencimento: parseDate(resolver('vencimentoaso', 'asovencimento')),
        salarioHora: parseNumber(resolver('salariohora')),
        salarioMes: parseNumber(resolver('salariomensal', 'salariomes')),
        obraId,
        criadoEm: new Date().toISOString(),
        ativo: true
      };

      if (isReASO(reOriginal) || situacao === 'Aguarda Exame') {
        funcionario.tipoVinculo = 'Mobilização';
      }

      const reNormalizado = normalizarRe(funcionario.re);
      const valido = Boolean(funcionario.nome && funcionario.funcao && funcionario.obraId && (!reNormalizado || reNormalizado.length >= 2));
      return { funcionario, valido, reNormalizado, motivo: valido ? '' : 'Nome, Função e Obra são obrigatórios' };
    }

    function abrirPreviewImportacao(registros) {
      previewImportacao = registros;
      const totalValidos = registros.filter((r) => r.valido).length;
      const totalInvalidos = registros.length - totalValidos;
      document.getElementById('importResumo').textContent = `${totalValidos} válidos • ${totalInvalidos} inválidos`;
      document.getElementById('importPreviewBody').innerHTML = registros.slice(0, 15).map((r) => {
        const obraNome = obras.find((o) => o.id === r.funcionario.obraId)?.nome || '-';
        return `<tr>
          <td>${escapeHtml(r.funcionario.re || '-')}</td>
          <td>${escapeHtml(r.funcionario.nome || '-')}</td>
          <td>${escapeHtml(r.funcionario.funcao || '-')}</td>
          <td>${escapeHtml(obraNome)}</td>
          <td><span class="badge ${r.valido ? 'on' : ''}">${r.valido ? 'OK' : escapeHtml(r.motivo)}</span></td>
        </tr>`;
      }).join('');
      document.getElementById('modalImport').style.display = 'flex';
    }

    async function importarArquivo(file) {
      if (!file) return;
      try {
        const linhas = await parsePlanilha(file);
        const registros = linhas.map(mapearLinha);
        if (!registros.length) {
          showToast('Planilha vazia.', 'error');
          return;
        }
        const mapaRePlanilha = new Map();
        const mapaReSistema = new Map();

        funcionarios.forEach((f) => {
          const re = normalizarRe(f.re);
          if (!re || !f.nome) return;
          if (!mapaReSistema.has(re)) mapaReSistema.set(re, new Set());
          mapaReSistema.get(re).add(normalizarTexto(f.nome));
        });

        registros.forEach((registro, index) => {
          const re = registro.reNormalizado;
          if (!re) return;
          if (!mapaRePlanilha.has(re)) mapaRePlanilha.set(re, []);
          mapaRePlanilha.get(re).push({ index, nome: registro.funcionario.nome });
        });

        const resDuplicados = [...mapaRePlanilha.entries()].filter(([, itens]) => itens.length > 1);
        if (resDuplicados.length) {
          showToast(`Importação bloqueada: ${resDuplicados.length} RE(s) duplicados na planilha.`, 'error');
          return;
        }

        const conflitos = [...mapaRePlanilha.entries()].filter(([re, itens]) => {
          const nomesSistema = mapaReSistema.get(re);
          if (!nomesSistema) return false;
          return itens.some((item) => !nomesSistema.has(normalizarTexto(item.nome)));
        });

        if (conflitos.length) {
          showToast(`Atenção: ${conflitos.length} RE(s) já existem com nomes diferentes no sistema.`, 'error');
        }
        abrirPreviewImportacao(registros);
      } catch (error) {
        console.error(error);
        showToast(error?.message || 'Falha ao ler planilha.', 'error');
      }
    }

    document.getElementById('novoFuncBtn').addEventListener('click', () => abrirModal());
    document.getElementById('cancelarFuncBtn').addEventListener('click', fecharModal);
    document.getElementById('searchInput').addEventListener('input', aplicarFiltros);
    document.getElementById('obraFilter').addEventListener('change', aplicarFiltros);

    cardsPanel.addEventListener('click', (event) => {
      const card = event.target.closest('[data-card]');
      if (!card) return;
      filtroCard = card.getAttribute('data-card');
      aplicarFiltros();
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const funcao = document.getElementById('funcao').value.trim();
      const payload = {
        re: document.getElementById('re').value.trim(),
        nome: document.getElementById('nome').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        funcao,
        cargo: funcao,
        setor: document.getElementById('setor').value,
        tipoVinculo: document.getElementById('tipoVinculo').value,
        situacao: normalizarSituacao(document.getElementById('situacao').value, document.getElementById('re').value.trim()),
        obraId: document.getElementById('obraId').value,
        dataAdmissao: document.getElementById('dataAdmissao').value,
        nascimento: document.getElementById('nascimento').value,
        cbo: document.getElementById('cbo').value.trim(),
        exp30: document.getElementById('exp30').value,
        exp60: document.getElementById('exp60').value,
        asoVencimento: document.getElementById('asoVencimento').value,
        salarioHora: Number(document.getElementById('salarioHora').value || 0),
        salarioMes: Number(document.getElementById('salarioMes').value || 0),
        criadoEm: new Date().toISOString(),
        ativo: true
      };

      if (editandoId) await updateFuncionario(editandoId, payload);
      else await addFuncionario(payload);

      showToast(editandoId ? 'Funcionário atualizado.' : 'Funcionário adicionado.');
      fecharModal();
    });

    tbody.addEventListener('click', async (event) => {
      const idEdit = event.target.getAttribute('data-edit');
      if (idEdit) {
        abrirModal(funcionarios.find((f) => f.id === idEdit));
        return;
      }

      const idDel = event.target.getAttribute('data-del');
      if (idDel && confirm('Excluir este funcionário?')) {
        await deleteFuncionario(idDel);
        showToast('Funcionário excluído.');
      }
    });

    document.getElementById('importarBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', async (event) => {
      await importarArquivo(event.target.files?.[0]);
      event.target.value = '';
    });

    document.getElementById('cancelarImportBtn').addEventListener('click', () => {
      document.getElementById('modalImport').style.display = 'none';
      previewImportacao = [];
    });

    document.getElementById('confirmarImportBtn').addEventListener('click', async () => {
      const validos = previewImportacao.filter((r) => r.valido).map((r) => r.funcionario);
      if (!validos.length) {
        showToast('Não há linhas válidas para importar.', 'error');
        return;
      }
      await Promise.all(validos.map((f) => addFuncionario(f)));
      document.getElementById('modalImport').style.display = 'none';
      showToast(`${validos.length} funcionários importados com sucesso.`);
      previewImportacao = [];
    });

    document.getElementById('apagarTodosBtn').addEventListener('click', async () => {
      if (!filtrados.length) {
        showToast('Não há funcionários para apagar.', 'error');
        return;
      }
      const escopo = isRhMatriz(usuarioLogado) ? 'todos os funcionários filtrados' : 'todos os funcionários da sua obra';
      if (!confirm(`Tem certeza que deseja apagar ${escopo}?`)) return;
      await Promise.all(filtrados.map((f) => deleteFuncionario(f.id)));
      showToast(`${filtrados.length} funcionário(s) removido(s).`);
    });

    document.getElementById('exportarCsvBtn').addEventListener('click', () => {
      const obraMap = new Map(obras.map((obra) => [obra.id, obra.nome || '']));
      exportarCSV('funcionarios.csv', ['re', 'nome', 'cpf', 'funcao', 'setor', 'tipoVinculo', 'situacao', 'dataAdmissao', 'nascimento', 'cbo', 'exp30', 'exp60', 'asoVencimento', 'salarioHora', 'salarioMes', 'obra'], filtrados.map((f) => ({
        re: f.re || '',
        nome: f.nome || '',
        cpf: f.cpf || '',
        funcao: f.funcao || '',
        setor: f.setor || '',
        tipoVinculo: f.tipoVinculo || '',
        situacao: f.situacao || '',
        dataAdmissao: f.dataAdmissao || '',
        nascimento: f.nascimento || '',
        cbo: f.cbo || '',
        exp30: f.exp30 || '',
        exp60: f.exp60 || '',
        asoVencimento: f.asoVencimento || '',
        salarioHora: f.salarioHora || 0,
        salarioMes: f.salarioMes || 0,
        obra: obraMap.get(f.obraId) || ''
      })));
    });

    subscribeObras((data) => {
      obras = filtrarObrasPorAcesso(data, usuarioLogado);
      preencherSelectObras();
      aplicarFiltros();
    });

    subscribeFuncionarios(null, (data) => {
      funcionarios = filtrarFuncionariosPorAcesso(data.map(normalizarFuncionario), usuarioLogado);
      aplicarFiltros();
    });
  </script>
</body>
</html>
