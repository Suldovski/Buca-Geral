<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header"><h1>Usuários do sistema</h1><button class="btn" id="novoUsuarioBtn">+ Novo Usuário</button></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Obra</th><th>Cadastrado em</th><th>Ações</th></tr></thead>
          <tbody id="tbodyUsuarios"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modalUsuario" class="modal">
    <div class="modal-content">
      <h3 id="usuarioModalTitle">Novo Usuário</h3>
      <form id="formUsuario" class="form-grid">
        <div class="field"><label for="usuarioNome">Nome</label><input id="usuarioNome" class="input" required></div>
        <div class="field"><label for="usuarioEmail">E-mail</label><input id="usuarioEmail" class="input" type="email" required></div>
        <div class="field"><label for="usuarioPerfil">Perfil</label><select id="usuarioPerfil" class="select"><option value="RH Matriz">RH Matriz</option></select></div>
        <div class="field"><label for="usuarioObraId">Obra</label><select id="usuarioObraId" class="select"><option value="">Sem vínculo</option></select></div>
        <div class="field" id="senhaField"><label for="usuarioSenha">Senha inicial</label><input id="usuarioSenha" class="input" type="password"></div>
        <div class="field" id="resetSenhaField" style="display:none">
          <label>Redefinir Senha</label>
          <button type="button" class="btn btn-outline btn-full-width" id="resetSenhaBtn">📧 Enviar email de redefinição</button>
          <p class="cell-muted help-text">Envia um link de redefinição ao email do usuário.</p>
        </div>
        <div class="dialog-foot">
          <button type="button" class="btn btn-outline" id="cancelarUsuarioBtn">Cancelar</button>
          <button type="submit" class="btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script type="module">
    import { mountLayout, subscribeUsuarios, subscribeObras, addUsuario, updateUsuario, deleteUsuario, escapeHtml, getUsuarioLogado, isRhMatriz, resetSenha, obraPerfilAcesso } from './app.js';

    mountLayout('usuarios');

    const tbody = document.getElementById('tbodyUsuarios');
    const modal = document.getElementById('modalUsuario');
    const form = document.getElementById('formUsuario');
    const senhaField = document.getElementById('senhaField');
    const resetSenhaField = document.getElementById('resetSenhaField');
    const title = document.getElementById('usuarioModalTitle');

    let usuarios = [];
    let obras = [];
    let editandoId = null;
    let editandoEmail = null;
    const usuarioLogado = getUsuarioLogado();
    const usuarioRhMatriz = isRhMatriz(usuarioLogado);

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    function formatarData(isoStr) {
      if (!isoStr) return '-';
      const d = new Date(isoStr);
      if (isNaN(d.getTime())) return '-';
      return d.toLocaleDateString('pt-BR');
    }

    function preencherObrasSelect() {
      const html = '<option value="">Sem vínculo</option>' + obras.map((o) => `<option value="${o.id}">${escapeHtml(o.nome)}</option>`).join('');
      document.getElementById('usuarioObraId').innerHTML = html;
      document.getElementById('usuarioPerfil').innerHTML = ['<option value="RH Matriz">RH Matriz</option>', ...obras.map((o) => {
        const perfil = obraPerfilAcesso(o);
        return `<option value="${escapeHtml(perfil)}">${escapeHtml(perfil)}</option>`;
      })].join('');
    }

    function render() {
      tbody.innerHTML = usuarios.map((u) => {
        const obraNome = obras.find((o) => o.id === u.obraId)?.nome || '-';
        return `<tr>
          <td class="cell-strong">${escapeHtml(u.nome)}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(u.email)}">${escapeHtml(u.email)}</td>
          <td>${escapeHtml(u.perfil || '-')}</td>
          <td>${escapeHtml(obraNome)}</td>
          <td class="cell-muted">${formatarData(u.criadoEm)}</td>
          <td>
            <div class="action-group">
              <button class="btn btn-sm btn-warning action-btn" title="Editar" data-edit="${u.id}" ${usuarioRhMatriz ? '' : 'disabled'}>✏️</button>
              <button class="btn btn-sm btn-danger action-btn" title="Apagar" data-del="${u.id}" ${usuarioRhMatriz ? '' : 'disabled'}>🗑️</button>
            </div>
          </td>
        </tr>`;
      }).join('');

      if (!usuarios.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Nenhum usuário cadastrado.</td></tr>';
      }
    }

    function abrirModal(usuario = null) {
      editandoId = usuario?.id || null;
      editandoEmail = usuario?.email || null;
      title.textContent = usuario ? 'Editar Usuário' : 'Novo Usuário';
      senhaField.style.display = usuario ? 'none' : 'block';
      resetSenhaField.style.display = usuario ? 'block' : 'none';
      document.getElementById('usuarioNome').value = usuario?.nome || '';
      document.getElementById('usuarioEmail').value = usuario?.email || '';
      document.getElementById('usuarioEmail').disabled = !!usuario;
      const perfilAtual = usuario?.perfil || 'RH Matriz';
      if (perfilAtual !== 'RH Matriz' && usuario?.obraId) {
        const obraEncontrada = obras.find((o) => o.id === usuario.obraId);
        const obraPerfil = obraEncontrada
          ? obraPerfilAcesso(obraEncontrada)
          : perfilAtual;
        document.getElementById('usuarioPerfil').value = obraPerfil;
      } else {
        document.getElementById('usuarioPerfil').value = perfilAtual;
      }
      document.getElementById('usuarioObraId').value = usuario?.obraId || '';
      modal.style.display = 'flex';
    }

    function fecharModal() {
      modal.style.display = 'none';
      form.reset();
      editandoId = null;
      editandoEmail = null;
      document.getElementById('usuarioEmail').disabled = false;
    }

    document.getElementById('resetSenhaBtn').addEventListener('click', async () => {
      if (!editandoEmail) return;
      try {
        await resetSenha(editandoEmail);
        showToast(`Email de redefinição enviado para ${editandoEmail}.`);
      } catch (err) {
        showToast('Falha ao enviar email de redefinição.', 'error');
      }
    });

    document.getElementById('novoUsuarioBtn').addEventListener('click', () => {
      abrirModal();
    });
    document.getElementById('cancelarUsuarioBtn').addEventListener('click', fecharModal);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const nome = document.getElementById('usuarioNome').value.trim();
      const email = document.getElementById('usuarioEmail').value.trim();
      const perfil = document.getElementById('usuarioPerfil').value;
      const obraIdCampo = document.getElementById('usuarioObraId').value || null;
      const obraId = perfil === 'RH Matriz' ? null : obraIdCampo;

      if (perfil !== 'RH Matriz' && !obraId) {
        alert('Selecione a obra para perfis de obra.');
        return;
      }

      if (editandoId) {
        if (!usuarioRhMatriz) {
          alert('Somente admin ou RH Matriz pode alterar usuários existentes.');
          return;
        }
        await updateUsuario(editandoId, { nome, perfil, obraId });
      } else {
        const senha = document.getElementById('usuarioSenha').value;
        if (!senha) {
          alert('Informe a senha inicial.');
          return;
        }
        await addUsuario({ nome, email, perfil, obraId, senha });
      }

      fecharModal();
    });

    tbody.addEventListener('click', async (event) => {
      if (!usuarioRhMatriz) return;
      const idEdit = event.target.getAttribute('data-edit');
      if (idEdit) {
        abrirModal(usuarios.find((u) => u.id === idEdit));
        return;
      }

      const idDel = event.target.getAttribute('data-del');
      if (idDel && confirm('Excluir este usuário do sistema?')) {
        await deleteUsuario(idDel);
      }
    });

    subscribeObras((data) => {
      obras = data;
      preencherObrasSelect();
      render();
    });

    subscribeUsuarios((data) => {
      usuarios = data;
      render();
    });

    document.getElementById('usuarioObraId').addEventListener('change', (event) => {
      if (!event.target.value) return;
      const obra = obras.find((o) => o.id === event.target.value);
      if (!obra) return;
      document.getElementById('usuarioPerfil').value = obraPerfilAcesso(obra);
    });
  </script>
</body>
</html>
