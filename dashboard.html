<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header"><h1>Dashboard</h1></div>
      <div class="grid cards-3">
        <div class="card stat"><div><div class="label">Obras</div><div class="value" id="stat-obras">0</div></div></div>
        <div class="card stat"><div><div class="label">Funcionários</div><div class="value" id="stat-func">0</div></div></div>
        <div class="card stat"><div><div class="label">Ativos</div><div class="value" id="stat-ativos">0</div></div></div>
      </div>
      <div class="card" style="margin-top:20px;">
        <h3>Cargos</h3>
        <div id="lista-cargos" class="list-stack"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { mountLayout, observarEstatisticasDashboard } from './app.js';

    mountLayout('dashboard');
    const lista = document.getElementById('lista-cargos');

    observarEstatisticasDashboard((stats) => {
      document.getElementById('stat-obras').textContent = stats.totalObras;
      document.getElementById('stat-func').textContent = stats.totalFuncionarios;
      document.getElementById('stat-ativos').textContent = stats.totalAtivos;

      const entries = Object.entries(stats.porCargo).sort((a, b) => b[1] - a[1]);
      lista.innerHTML = entries.length
        ? entries.map(([cargo, total]) => `<div class="list-row"><span>${cargo}</span><strong>${total}</strong></div>`).join('')
        : '<p class="cell-muted">Sem dados.</p>';
    });
  </script>
</body>
</html>
