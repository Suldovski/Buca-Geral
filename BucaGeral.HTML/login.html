<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login ∑ Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login">
    <div class="card login-card">
      <div class="logo">B</div>
      <h2>Bucagrans</h2>
      <p class="sub">Entre na sua conta</p>
      <form id="loginForm">
        <div class="field">
          <label>E-mail</label>
          <input id="email" class="input" type="email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input id="senha" class="input" type="password" required />
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
      <div id="erroMsg" style="color:red; margin-top:15px; text-align:center;"></div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const response = await fetch('http://localhost:5000/api/Auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      if (response.ok) {
        const usuario = await response.json();
        localStorage.setItem('usuario', JSON.stringify(usuario));
        window.location.href = 'inicio.html';
      } else {
        document.getElementById('erroMsg').innerText = 'E-mail ou senha inv·lidos';
      }
    });
  </script>
</body>
</html>
