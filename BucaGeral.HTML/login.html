<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login · Bucagrans</title><link rel="stylesheet" href="styles.css"></head>
<body class="login-page">
<div class="login-container"><div class="login-card"><div class="logo">B</div><h2>Bucagrans</h2><p class="sub">Construtora de Obras SA</p>
<form id="loginForm"><div class="field"><label>E-mail</label><input type="email" id="email" class="input" required></div><div class="field"><label>Senha</label><input type="password" id="senha" class="input" required></div><button type="submit" class="btn">Entrar</button></form>
<div id="errorMsg" class="error"></div></div></div>
<script type="module">import { fazerLogin } from './app.js'; document.getElementById('loginForm').onsubmit = async (e) => { e.preventDefault(); const ok = await fazerLogin(document.getElementById('email').value, document.getElementById('senha').value); if (ok) window.location.href = 'inicio.html'; else document.getElementById('errorMsg').innerText = 'E-mail ou senha inválidos'; };</script>
</body>
</html>
