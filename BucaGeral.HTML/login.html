<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login">
    <div class="card login-card">
      <div class="logo">B</div>
      <h2>Bucagrans</h2>
      <p class="sub">Entre com sua conta Firebase</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" class="input" type="email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <input id="senha" class="input" type="password" minlength="6" required />
        </div>
        <button type="submit" class="btn login-btn">Entrar</button>
      </form>
      <div id="erroMsg" class="login-error" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <script type="module">
    import './app.js';
  </script>
</body>
</html>
