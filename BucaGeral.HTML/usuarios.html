<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Usuários · Bucagrans</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app"><div id="sidebar-slot"></div><main><div class="page-header"><h1>Usuários</h1><button class="btn" id="novoUsuarioBtn">+ Novo Usuário</button></div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Obra</th><th>Ações</th></tr></thead><tbody id="tbodyUsuarios"></tbody></table></div></main></div>
<script type="module">import { mountLayout, getUsuarios, addUsuario } from './app.js'; mountLayout('usuarios'); const tbody = document.getElementById('tbodyUsuarios'); async function carregar() { const users = await getUsuarios(); tbody.innerHTML = users.map(u => '<tr><td class="cell-strong">'+u.nome+'</td><td>'+u.email+'</td><td>'+ (u.perfil||'Operador') +'</td><td>'+ (u.obraId ? 'Vinculado' : 'RH Matriz') +'</td><td><button class="btn btn-sm btn-warning">Editar</button> <button class="btn btn-sm btn-danger">Excluir</button></td></tr>').join(''); } document.getElementById('novoUsuarioBtn').onclick = async () => { const nome = prompt('Nome:'); const email = prompt('Email:'); const senha = prompt('Senha:'); const perfil = confirm('RH Matriz?') ? 'RH Matriz' : 'Obra'; if(nome && email && senha) { await addUsuario({ nome, email, senha, perfil }); await carregar(); } }; await carregar();</script>
</body></html>
