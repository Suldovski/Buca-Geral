<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header">
        <h1>Usuários</h1>
        <button class="btn" id="novoUsuarioBtn">+ Novo usuário</button>
      </div>

      <!-- TABELA DE USUÁRIOS -->
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Perfil</th>
              <th>Obra</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyUsuarios"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL NOVO/EDITAR USUÁRIO -->
  <div id="modalUsuario" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModalUsuario()">&times;</span>
      <h3 id="modalUsuarioTitle">Novo Usuário</h3>
      <form id="formUsuario">
        <input type="hidden" id="usuarioId">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="usuarioNome" class="input" required>
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="usuarioEmail" class="input" required>
        </div>
        <div class="field" id="senhaField">
          <label>Senha</label>
          <input type="password" id="usuarioSenha" class="input" placeholder="********">
          <small class="senha-hint">Preencha apenas para alterar a senha</small>
        </div>
        <div class="field">
          <label>Perfil</label>
          <select id="usuarioPerfil" class="select" required>
            <option value="RH Matriz">RH Matriz</option>
            <option value="Obra">Obra</option>
          </select>
        </div>
        <div class="field" id="obraField" style="display:none;">
          <label>Obra vinculada</label>
          <select id="usuarioObraId" class="select">
            <option value="">Selecione uma obra</option>
          </select>
        </div>
        <div class="dialog-foot">
          <button type="submit" class="btn">Salvar</button>
          <button type="button" class="btn btn-outline" onclick="fecharModalUsuario()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { 
      mountLayout, 
      getUsuarios, 
      addUsuario, 
      getObras 
    } from './app.js';
    
    // Monta o menu lateral (CORREÇÃO PRINCIPAL)
    mountLayout('usuarios');
    
    let todasObras = [];
    let todosUsuarios = [];
    
    // Carrega obras para o select
    async function carregarObrasSelect() {
      todasObras = await getObras();
      const select = document.getElementById('usuarioObraId');
      select.innerHTML = '<option value="">Selecione uma obra</option>' + 
        todasObras.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
    }
    
    // Carrega e exibe usuários
    async function carregarEExibirUsuarios() {
      todosUsuarios = await getUsuarios();
      const tbody = document.getElementById('tbodyUsuarios');
      if (!tbody) return;
      
      tbody.innerHTML = todosUsuarios.map(u => {
        const obraNome = todasObras.find(o => o.id === u.obraId)?.nome || '-';
        return `<tr>
          <td class="cell-strong">${u.nome || ''}】,
          <td class="cell-muted">${u.email || ''}】,
          <td><span class="badge ${u.perfil === 'RH Matriz' ? 'on' : ''}">${u.perfil || 'Operador'}</span>】,
          <td><span class="badge">${obraNome}</span>】,
          <td>
            <button class="btn btn-sm btn-warning" onclick="abrirModalEditar('${u.id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluirUsuario('${u.id}')">Excluir</button>
          】,
        </tr>`;
      }).join('');
      
      if (todosUsuarios.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="cell-muted" style="text-align:center">Nenhum usuário cadastrado】,</tr>';
      }
    }
    
    // Abrir modal para novo usuário
    window.abrirModalNovo = () => {
      document.getElementById('modalUsuarioTitle').innerText = 'Novo Usuário';
      document.getElementById('formUsuario').reset();
      document.getElementById('usuarioId').value = '';
      document.getElementById('senhaField').style.display = 'block';
      document.getElementById('obraField').style.display = 'none';
      document.getElementById('modalUsuario').style.display = 'flex';
    };
    
    // Abrir modal para editar usuário
    window.abrirModalEditar = async (id) => {
      const usuario = todosUsuarios.find(u => u.id === id);
      if (!usuario) return;
      
      document.getElementById('modalUsuarioTitle').innerText = 'Editar Usuário';
      document.getElementById('usuarioId').value = usuario.id;
      document.getElementById('usuarioNome').value = usuario.nome || '';
      document.getElementById('usuarioEmail').value = usuario.email || '';
      document.getElementById('usuarioPerfil').value = usuario.perfil || 'Obra';
      document.getElementById('usuarioSenha').value = '';
      document.getElementById('senhaField').style.display = 'block';
      
      if (usuario.perfil === 'Obra') {
        document.getElementById('obraField').style.display = 'block';
        document.getElementById('usuarioObraId').value = usuario.obraId || '';
      } else {
        document.getElementById('obraField').style.display = 'none';
      }
      
      document.getElementById('modalUsuario').style.display = 'flex';
    };
    
    window.fecharModalUsuario = () => {
      document.getElementById('modalUsuario').style.display = 'none';
    };
    
    window.excluirUsuario = async (id) => {
      if (confirm('Tem certeza que deseja excluir este usuário?')) {
        // await deleteUsuario(id); // Descomente quando tiver a função
        await carregarEExibirUsuarios();
        alert('Função de excluir será implementada em breve');
      }
    };
    
    // Salvar usuário
    document.getElementById('formUsuario').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usuarioData = {
        nome: document.getElementById('usuarioNome').value,
        email: document.getElementById('usuarioEmail').value,
        perfil: document.getElementById('usuarioPerfil').value,
      };
      
      if (usuarioData.perfil === 'Obra') {
        usuarioData.obraId = document.getElementById('usuarioObraId').value;
      }
      
      const senha = document.getElementById('usuarioSenha').value;
      if (senha) usuarioData.senha = senha;
      
      await addUsuario(usuarioData);
      fecharModalUsuario();
      await carregarEExibirUsuarios();
      alert('Usuário salvo com sucesso!');
    });
    
    // Mostrar/esconder campo obra conforme perfil
    document.getElementById('usuarioPerfil').addEventListener('change', (e) => {
      const obraField = document.getElementById('obraField');
      if (e.target.value === 'Obra') {
        obraField.style.display = 'block';
      } else {
        obraField.style.display = 'none';
      }
    });
    
    // Inicialização
    await carregarObrasSelect();
    await carregarEExibirUsuarios();
    
    // Botão novo usuário
    document.getElementById('novoUsuarioBtn').onclick = () => window.abrirModalNovo();
    
    // Funções globais para os botões da tabela
    window.abrirModalEditar = window.abrirModalEditar;
    window.excluirUsuario = window.excluirUsuario;
  </script>
</body>
</html>
