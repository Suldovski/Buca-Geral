<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Usuários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

        <h1>Usuários</h1>

      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    BG.mountLayout("usuarios");
    BG.renderUsuarios();
  </script>
</body>
</html>
