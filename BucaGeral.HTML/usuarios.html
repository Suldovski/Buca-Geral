<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <h1>Usuários do Sistema</h1>
      <div id="usuarios-list"></div>
    </main>
  </div>
  <script type="module">
    import { mountLayout, getUsuarios } from './app.js';
    mountLayout('usuarios');
    
    const usuarios = await getUsuarios();
    const container = document.getElementById('usuarios-list');
    container.innerHTML = usuarios.map(u => `<div class="usuario-card"><p><strong>${u.nome}</strong> (${u.email})</p></div>`).join('');
  </script>
</body>
</html>
