<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalhe da Obra · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <a href="obras.html" class="back-link">← Voltar para obras</a>
      <h1 id="obraNome">Carregando...</h1>

      <!-- CARDS OBCAS -->
      <div class="stats-panel" id="statsPanel"></div>

      <!-- BOTÕES DE AÇÃO -->
      <div class="btn-group">
        <button class="btn" id="importarBtn">📥 Importar Planilha</button>
        <button class="btn" id="exportarBtn">📤 Exportar Dados</button>
        <button class="btn btn-danger" id="apagarTodosBtn">🗑️ Apagar Todos</button>
      </div>

      <!-- BUSCA -->
      <div class="filters-bar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="searchInput" class="input" type="text" placeholder="Buscar funcionário por nome, cargo ou RE">
        </div>
      </div>

      <!-- TABELA COMPLETA -->
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr>
              <th>RE</th>
              <th>Nome</th>
              <th>Cargo</th>
              <th>Setor</th>
              <th>Tipo Vínculo</th>
              <th>Admissão</th>
              <th>Situação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyFuncionarios"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL IMPORTAR PLANILHA -->
  <div id="modalImportar" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModalImportar()">&times;</span>
      <h3>Importar Planilha</h3>
      <p>Selecione um arquivo Excel (.xlsx) com os dados dos funcionários</p>
      <input type="file" id="fileExcel" accept=".xlsx">
      <div class="dialog-foot" style="margin-top: 20px;">
        <button class="btn" id="confirmarImportarBtn">Importar</button>
        <button class="btn btn-outline" onclick="fecharModalImportar()">Cancelar</button>
      </div>
      <div id="importStatus" style="margin-top: 10px;"></div>
    </div>
  </div>

  <!-- MODAL EDITAR FUNCIONÁRIO -->
  <div id="modalEditarFunc" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModalEditar()">&times;</span>
      <h3>Editar Funcionário</h3>
      <form id="formEditarFuncionario">
        <input type="hidden" id="editId">
        <div class="field"><label>RE</label><input id="editRe" class="input"></div>
        <div class="field"><label>Nome</label><input id="editNome" class="input" required></div>
        <div class="field"><label>Cargo</label><input id="editCargo" class="input" required></div>
        <div class="field"><label>Setor</label><input id="editSetor" class="input"></div>
        <div class="field"><label>Tipo Vínculo</label>
          <select id="editTipoVinculo" class="select">
            <option value="Efetivo">Efetivo</option>
            <option value="PJ">PJ</option>
            <option value="Terceiros">Terceiros</option>
            <option value="Mobilização">Mobilização</option>
            <option value="Alteração de Função">Alteração de Função</option>
          </select>
        </div>
        <div class="field"><label>Data Admissão</label><input type="date" id="editDataAdmissao" class="input"></div>
        <div class="field"><label>Situação</label>
          <select id="editSituacao" class="select">
            <option value="Ativo">Ativo</option>
            <option value="Aguarda Exame">Aguarda Exame</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>
        <div class="dialog-foot">
          <button type="submit" class="btn">Salvar</button>
          <button type="button" class="btn btn-outline" onclick="fecharModalEditar()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { 
      mountLayout, 
      carregarDetalheObra,
      getObras,
      getFuncionarios,
      updateFuncionario,
      deleteFuncionario
    } from './app.js';
    
    // Monta o menu lateral
    mountLayout('obras');
    
    // Carrega os dados da obra
    const urlParams = new URLSearchParams(window.location.search);
    const obraId = urlParams.get('id');
    
    let obras = await getObras();
    let obra = obras.find(o => o.id === obraId);
    let todosFuncionarios = await getFuncionarios(obraId);
    
    if (obra) {
      document.getElementById('obraNome').innerText = obra.nome;
    } else {
      document.getElementById('obraNome').innerText = 'Obra não encontrada';
    }
    
    // Renderiza cards OBCAS
    function renderizarCards(funcionarios) {
      const tipos = {
        'Total Geral': funcionarios.length,
        'Efetivos': funcionarios.filter(f => f.tipoVinculo === 'Efetivo').length,
        'PJ': funcionarios.filter(f => f.tipoVinculo === 'PJ').length,
        'Operacional': funcionarios.filter(f => f.setor === 'Operacional').length,
        'ADM': funcionarios.filter(f => f.setor === 'ADM').length,
        'Mobilização': funcionarios.filter(f => f.tipoVinculo === 'Mobilização').length,
        'Alteração de Função': funcionarios.filter(f => f.tipoVinculo === 'Alteração de Função').length,
        'Terceiros': funcionarios.filter(f => f.tipoVinculo === 'Terceiros').length
      };
      
      const panel = document.getElementById('statsPanel');
      if (panel) {
        panel.innerHTML = '';
        for (const [label, value] of Object.entries(tipos)) {
          const card = document.createElement('div');
          card.className = 'stat-card';
          card.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`;
          card.onclick = () => filtrarPorCategoria(label, funcionarios);
          panel.appendChild(card);
        }
      }
    }
    
    function filtrarPorCategoria(categoria, funcionarios) {
      let filtrados;
      switch(categoria) {
        case 'Efetivos': filtrados = funcionarios.filter(f => f.tipoVinculo === 'Efetivo'); break;
        case 'PJ': filtrados = funcionarios.filter(f => f.tipoVinculo === 'PJ'); break;
        case 'Operacional': filtrados = funcionarios.filter(f => f.setor === 'Operacional'); break;
        case 'ADM': filtrados = funcionarios.filter(f => f.setor === 'ADM'); break;
        case 'Mobilização': filtrados = funcionarios.filter(f => f.tipoVinculo === 'Mobilização'); break;
        case 'Alteração de Função': filtrados = funcionarios.filter(f => f.tipoVinculo === 'Alteração de Função'); break;
        case 'Terceiros': filtrados = funcionarios.filter(f => f.tipoVinculo === 'Terceiros'); break;
        default: filtrados = funcionarios;
      }
      renderizarTabela(filtrados);
    }
    
    function renderizarTabela(funcionarios) {
      const tbody = document.getElementById('tbodyFuncionarios');
      if (!tbody) return;
      
      tbody.innerHTML = funcionarios.map(f => `
        <tr>
          <td class="cell-strong">${f.re || '-'}</td>
          <td class="cell-strong">${f.nome || ''}</td>
          <td>${f.cargo || ''}</td>
          <td>${f.setor || '-'}</td>
          <td><span class="badge ${f.tipoVinculo === 'Efetivo' ? 'on' : ''}">${f.tipoVinculo || '-'}</span></td>
          <td>${f.dataAdmissao ? new Date(f.dataAdmissao).toLocaleDateString() : '-'}</td>
          <td><span class="badge ${f.situacao === 'Ativo' ? 'on' : ''}">${f.situacao || 'Ativo'}</span></td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="abrirModalEditar('${f.id}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluirFuncionario('${f.id}')">Excluir</button>
          </td>
        </tr>
      `).join('');
      
      if (funcionarios.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="cell-muted" style="text-align:center">Nenhum funcionário cadastrado nesta obra</td></tr>';
      }
    }
    
    function filtrarTabela() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      if (!searchTerm) {
        renderizarTabela(todosFuncionarios);
        renderizarCards(todosFuncionarios);
        return;
      }
      const filtrados = todosFuncionarios.filter(f => 
        (f.nome && f.nome.toLowerCase().includes(searchTerm)) ||
        (f.cargo && f.cargo.toLowerCase().includes(searchTerm)) ||
        (f.re && f.re.toLowerCase().includes(searchTerm))
      );
      renderizarTabela(filtrados);
      renderizarCards(filtrados);
    }
    
    // Configura eventos
    document.getElementById('searchInput').addEventListener('input', filtrarTabela);
    
    // Botões de ação
    document.getElementById('importarBtn').onclick = () => {
      document.getElementById('modalImportar').style.display = 'flex';
    };
    
    document.getElementById('exportarBtn').onclick = () => {
      alert('Exportação será implementada em breve');
    };
    
    document.getElementById('apagarTodosBtn').onclick = async () => {
      if (confirm('⚠️ ATENÇÃO: Isso excluirá TODOS os funcionários desta obra. Deseja continuar?')) {
        for (const f of todosFuncionarios) {
          await deleteFuncionario(f.id);
        }
        window.location.reload();
      }
    };
    
    // Modal de importação
    window.fecharModalImportar = () => {
      document.getElementById('modalImportar').style.display = 'none';
    };
    
    document.getElementById('confirmarImportarBtn').onclick = async () => {
      const file = document.getElementById('fileExcel').files[0];
      if (!file) {
        alert('Selecione um arquivo Excel');
        return;
      }
      alert('Importação será implementada em breve');
      fecharModalImportar();
    };
    
    // Modal de edição
    window.abrirModalEditar = async (id) => {
      const func = todosFuncionarios.find(f => f.id === id);
      if (func) {
        document.getElementById('editId').value = func.id;
        document.getElementById('editRe').value = func.re || '';
        document.getElementById('editNome').value = func.nome || '';
        document.getElementById('editCargo').value = func.cargo || '';
        document.getElementById('editSetor').value = func.setor || '';
        document.getElementById('editTipoVinculo').value = func.tipoVinculo || 'Efetivo';
        document.getElementById('editDataAdmissao').value = func.dataAdmissao || '';
        document.getElementById('editSituacao').value = func.situacao || 'Ativo';
        document.getElementById('modalEditarFunc').style.display = 'flex';
      }
    };
    
    window.fecharModalEditar = () => {
      document.getElementById('modalEditarFunc').style.display = 'none';
    };
    
    document.getElementById('formEditarFuncionario').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const dados = {
        re: document.getElementById('editRe').value,
        nome: document.getElementById('editNome').value,
        cargo: document.getElementById('editCargo').value,
        setor: document.getElementById('editSetor').value,
        tipoVinculo: document.getElementById('editTipoVinculo').value,
        dataAdmissao: document.getElementById('editDataAdmissao').value,
        situacao: document.getElementById('editSituacao').value,
        obraId: obraId,
        ativo: true
      };
      await updateFuncionario(id, dados);
      fecharModalEditar();
      window.location.reload();
    });
    
    window.excluirFuncionario = async (id) => {
      if (confirm('Excluir este funcionário?')) {
        await deleteFuncionario(id);
        window.location.reload();
      }
    };
    
    // Renderização inicial
    renderizarCards(todosFuncionarios);
    renderizarTabela(todosFuncionarios);
  </script>
</body>
</html>
