<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe da Obra · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <a href="obras.html" class="back-link">← Voltar para obras</a>
      <h1 id="obra-nome">Carregando...</h1>
      <div id="funcionarios-list"></div>
      <button id="novo-funcionario-btn">+ Novo Funcionário</button>
    </main>
  </div>
  <div id="modal-funcionario" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Novo Funcionário</h3>
      <form id="form-funcionario">
        <input type="text" id="func-nome" placeholder="Nome" required>
        <input type="text" id="func-cargo" placeholder="Cargo" required>
        <button type="submit">Salvar</button>
      </form>
    </div>
  </div>
  <script type="module">
    import { mountLayout, getObras, getFuncionarios, addFuncionario } from './app.js';
    
    mountLayout('obras');
    
    const urlParams = new URLSearchParams(window.location.search);
    const obraId = urlParams.get('id');
    let obra = null;
    
    async function carregarObraEFuncionarios() {
      const obras = await getObras();
      obra = obras.find(o => o.id === obraId);
      if (!obra) {
        document.getElementById('obra-nome').innerText = 'Obra não encontrada';
        return;
      }
      document.getElementById('obra-nome').innerText = obra.nome;
      
      const funcionarios = await getFuncionarios(obraId);
      const container = document.getElementById('funcionarios-list');
      container.innerHTML = funcionarios.map(f => `
        <div class="funcionario-card">
          <p><strong>${f.nome}</strong> - ${f.cargo}</p>
        </div>
      `).join('');
    }
    
    await carregarObraEFuncionarios();
    
    // Modal para novo funcionário
    const modal = document.getElementById('modal-funcionario');
    const btn = document.getElementById('novo-funcionario-btn');
    const span = document.getElementsByClassName('close')[0];
    
    btn.onclick = () => modal.style.display = 'block';
    span.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };
    
    document.getElementById('form-funcionario').onsubmit = async (e) => {
      e.preventDefault();
      const nome = document.getElementById('func-nome').value;
      const cargo = document.getElementById('func-cargo').value;
      await addFuncionario({ nome, cargo, obraId, ativo: true });
      modal.style.display = 'none';
      document.getElementById('form-funcionario').reset();
      await carregarObraEFuncionarios();
    };
  </script>
</body>
</html>
