<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalhe da Obra · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <a href="obras.html" class="back-link">← Voltar para obras</a>
      <h1 id="obraNome">Carregando...</h1>

      <div class="stats-panel" id="statsPanel"></div>

      <div class="btn-group">
        <button class="btn" id="importarBtn">Importar Planilha</button>
        <button class="btn" id="exportarBtn">Exportar Dados</button>
        <button class="btn btn-danger" id="apagarTodosBtn">Apagar Todos</button>
      </div>

      <div class="filters-bar">
        <div class="search"><input id="searchInput" class="input" type="text" placeholder="Buscar funcionário"></div>
        <div class="rankings" id="rankings"></div>
      </div>

      <div class="table-wrap">
        <table style="width:100%">
          <thead><tr><th>RE</th><th>Nome</th><th>Cargo</th><th>Setor</th><th>Tipo</th><th>Admissão</th><th>Ações</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modalEditFunc" class="modal"><div class="modal-content"><span class="close" onclick="fecharModalEdit()">&times;</span><h3>Editar Funcionário</h3><form id="formEditFunc"><input type="hidden" id="editId"><div class="field"><label>RE</label><input id="editRE" class="input"></div><div class="field"><label>Nome</label><input id="editNome" class="input"></div><div class="field"><label>Cargo</label><input id="editCargo" class="input"></div><div class="field"><label>Setor</label><input id="editSetor" class="input"></div><div class="field"><label>Tipo Vínculo</label><select id="editTipoVinculo" class="select"><option>Efetivo</option><option>PJ</option><option>Terceiros</option><option>Mobilização</option><option>Alteração de Função</option></select></div><div class="field"><label>Situação</label><select id="editSituacao" class="select"><option>Ativo</option><option>Aguarda Exame</option><option>Inativo</option></select></div><div class="field"><label>Data Admissão</label><input type="date" id="editDataAdmissao" class="input"></div><button type="submit" class="btn">Salvar</button></form></div></div>

  <script src="app.js"></script>
  <script>
    BG.mountLayout("obras");
    BG.carregarDetalheObra();
  </script>
</body>
</html>
