<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funcionários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <style>.filters-bar { display: flex; gap: 16px; margin-bottom: 24px; align-items: flex-end; } .filters-bar .search { flex: 2; }</style>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header">
        <h1>Funcionários</h1>
        <button class="btn" id="novoFuncBtn">+ Novo Funcionário</button>
      </div>
      <div class="stats-panel" id="statsPanel"></div>
      <div class="filters-bar">
        <div class="search"><input id="searchInput" class="input" placeholder="Buscar"></div>
        <select id="obraFilter" class="select"><option value="">Todas as obras</option></select>
      </div>
      <div class="btn-group"><button class="btn" id="importarBtn">Importar Planilha</button><button class="btn" id="exportarBtn">Exportar Dados</button><button class="btn btn-danger" id="apagarTodosBtn">Apagar Todos</button></div>
      <div class="table-wrap"><table><thead><tr><th>RE</th><th>Nome</th><th>Cargo</th><th>Obra</th><th>Tipo</th><th>Ações</th></tr></thead><tbody id="tbody"></tbody></table></div>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    BG.mountLayout("funcionarios");
    BG.carregarFuncionarios();
  </script>
</body>
</html>
