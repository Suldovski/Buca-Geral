<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funcionários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <h1>Funcionários</h1>
      <div id="funcionarios-list"></div>
    </main>
  </div>
  <script type="module">
    import { mountLayout, getFuncionarios, getObras } from './app.js';
    mountLayout('funcionarios');
    
    const obras = await getObras();
    const funcionarios = await getFuncionarios();
    const container = document.getElementById('funcionarios-list');
    
    container.innerHTML = funcionarios.map(f => {
      const obraNome = obras.find(o => o.id === f.obraId)?.nome || 'N/A';
      return `<div class="funcionario-card"><p><strong>${f.nome}</strong> - ${f.cargo} (${obraNome})</p></div>`;
    }).join('');
  </script>
</body>
</html>
