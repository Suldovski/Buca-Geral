<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funcionários · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .stats-panel { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .stat-card { flex: 1; min-width: 100px; background: white; border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; cursor: pointer; text-align: center; }
    .stat-card .label { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #0f172a; }
    .filters-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; align-items: flex-end; }
    .filters-bar .search { flex: 2; min-width: 250px; position: relative; }
    .filters-bar .search input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #e2e8f0; border-radius: 8px; }
    .filters-bar .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; }
    .btn-group { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 700px; max-height: 90%; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .close { cursor: pointer; font-size: 24px; }
    .dialog-foot { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px; }
    .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header">
        <h1>Funcionários</h1>
        <button class="btn" id="novoFuncionarioBtn" style="background: #10b981;">➕ Novo Funcionário</button>
      </div>

      <div class="stats-panel" id="statsPanel"></div>

      <div class="filters-bar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="7"/>
            <path d="M21 21l-4.3-4.3"/>
          </svg>
          <input id="searchInput" class="input" placeholder="Buscar funcionário por nome, cargo ou RE">
        </div>
        <select id="obraFilter" class="input" style="width: 220px;">
          <option value="">Todas as obras</option>
        </select>
      </div>

      <div class="btn-group">
        <button class="btn" id="importarBtn">📥 Importar Planilha</button>
        <button class="btn" id="exportarBtn">📤 Exportar Dados</button>
        <button class="btn btn-danger" id="apagarTodosBtn">🗑️ Apagar Todos</button>
      </div>

      <div class="table-wrap" style="overflow-x: auto;">
        <table style="width: 100%; min-width: 1200px;">
          <thead>
            <tr>
              <th>RE</th><th>Nome</th><th>Cargo</th><th>Setor</th><th>Tipo</th>
              <th>Admissão</th><th>Nascimento</th><th>CBO</th><th>Exp.30</th><th>Exp.60</th>
              <th>Sal/Hora</th><th>Sal/Mês</th><th>Obra</th><th>Situação</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyFuncionarios"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL NOVO FUNCIONÁRIO -->
  <div id="modalFuncionario" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Novo Funcionário</h3>
        <span class="close" onclick="fecharModalFuncionario()">&times;</span>
      </div>
      <form id="formFuncionario">
        <div class="form-grid">
          <div class="field"><label>RE</label><input type="text" id="re" class="input"></div>
          <div class="field"><label>Nome *</label><input type="text" id="nome" class="input" required></div>
          <div class="field"><label>Cargo *</label><input type="text" id="cargo" class="input" required></div>
          <div class="field"><label>Setor</label><select id="setor" class="input"><option>Operacional</option><option>ADM</option></select></div>
          <div class="field"><label>Tipo Vínculo</label><select id="tipoVinculo" class="input"><option>Efetivo</option><option>PJ</option><option>Terceiros</option><option>Mobilização</option><option>Alteração de Função</option></select></div>
          <div class="field"><label>Obra</label><select id="obraId" class="input" required></select></div>
          <div class="field"><label>Data Admissão</label><input type="date" id="dataAdmissao" class="input"></div>
          <div class="field"><label>Data Nascimento</label><input type="date" id="nascimento" class="input"></div>
          <div class="field"><label>CBO</label><input type="text" id="cbo" class="input"></div>
          <div class="field"><label>Exp.30</label><input type="date" id="exp30" class="input"></div>
          <div class="field"><label>Exp.60</label><input type="date" id="exp60" class="input"></div>
          <div class="field"><label>Salário/Hora</label><input type="number" step="0.01" id="salarioHora" class="input"></div>
          <div class="field"><label>Salário/Mês</label><input type="number" step="0.01" id="salarioMes" class="input"></div>
          <div class="field"><label>Situação</label><select id="situacao" class="input"><option>Ativo</option><option>Aguarda Exame</option><option>Inativo</option></select></div>
        </div>
        <div class="dialog-foot">
          <button type="submit" class="btn">Salvar</button>
          <button type="button" class="btn btn-outline" onclick="fecharModalFuncionario()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { mountLayout, getObras, getFuncionarios, addFuncionario, deleteFuncionario } from './app.js';
    mountLayout('funcionarios');
    
    let todasObras = [];
    let todosFuncionarios = [];
    
    async function carregar() {
      todasObras = await getObras();
      todosFuncionarios = await getFuncionarios();
      
      const select = document.getElementById('obraFilter');
      select.innerHTML = '<option value="">Todas as obras</option>' + todasObras.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
      
      renderizarCards(todosFuncionarios);
      renderizarTabela(todosFuncionarios);
      
      // Popular select do modal
      const modalSelect = document.getElementById('obraId');
      modalSelect.innerHTML = todasObras.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
    }
    
    function renderizarCards(funcionarios) {
      const tipos = {
        'Total Geral': funcionarios.length,
        'Efetivos': funcionarios.filter(f => f.tipoVinculo === 'Efetivo').length,
        'PJ': funcionarios.filter(f => f.tipoVinculo === 'PJ').length,
        'Operacional': funcionarios.filter(f => f.setor === 'Operacional').length,
        'ADM': funcionarios.filter(f => f.setor === 'ADM').length,
        'Mobilização': funcionarios.filter(f => f.tipoVinculo === 'Mobilização').length,
        'Alteração de Função': funcionarios.filter(f => f.tipoVinculo === 'Alteração de Função').length,
        'Terceiros': funcionarios.filter(f => f.tipoVinculo === 'Terceiros').length
      };
      const panel = document.getElementById('statsPanel');
      panel.innerHTML = '';
      for (const [label, value] of Object.entries(tipos)) {
        const card = document.createElement('div');
        card.className = 'stat-card';
        card.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`;
        panel.appendChild(card);
      }
    }
    
    function renderizarTabela(funcionarios) {
      const tbody = document.getElementById('tbodyFuncionarios');
      if (!tbody) return;
      
      if (funcionarios.length === 0) {
        tbody.innerHTML = '<tr><td colspan="15" style="text-align:center;padding:40px;">Nenhum funcionário cadastrado</a></tr>';
        return;
      }
      
      tbody.innerHTML = funcionarios.map(f => {
        const obraNome = todasObras.find(o => o.id === f.obraId)?.nome || 'N/A';
        return `<tr>
          <td class="cell-strong">${f.re || '-'}</a>
          <td class="cell-strong">${f.nome || ''}</a>
          <td class="cell-muted">${f.cargo || ''}</a>
          <td class="cell-muted">${f.setor || '-'}</a>
          <td class="cell-muted">${f.tipoVinculo || '-'}</a>
          <td class="cell-muted">${f.dataAdmissao ? new Date(f.dataAdmissao).toLocaleDateString() : '-'}</a>
          <td class="cell-muted">${f.nascimento ? new Date(f.nascimento).toLocaleDateString() : '-'}</a>
          <td class="cell-muted">${f.cbo || '-'}</a>
          <td class="cell-muted">${f.exp30 ? new Date(f.exp30).toLocaleDateString() : '-'}</a>
          <td class="cell-muted">${f.exp60 ? new Date(f.exp60).toLocaleDateString() : '-'}</a>
          <td class="cell-muted">${f.salarioHora ? 'R$ ' + f.salarioHora.toFixed(2) : '-'}</a>
          <td class="cell-muted">${f.salarioMes ? 'R$ ' + f.salarioMes.toFixed(2) : '-'}</a>
          <td class="cell-muted">${obraNome}</a>
          <td class="cell-muted"><span class="badge ${f.situacao === 'Ativo' ? 'on' : ''}">${f.situacao || 'Ativo'}</span></a>
          <td class="cell-muted">
            <button class="btn btn-sm btn-warning" onclick="alert('Editar ${f.id}')">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="excluirFuncionario('${f.id}')">🗑️</button>
          </a>
        </tr>`;
      }).join('');
    }
    
    window.excluirFuncionario = async (id) => {
      if (confirm('Excluir este funcionário?')) {
        await deleteFuncionario(id);
        await carregar();
      }
    };
    
    document.getElementById('searchInput').addEventListener('input', () => {
      const termo = document.getElementById('searchInput').value.toLowerCase();
      const filtrados = todosFuncionarios.filter(f => 
        (f.nome && f.nome.toLowerCase().includes(termo)) || 
        (f.cargo && f.cargo.toLowerCase().includes(termo)) ||
        (f.re && f.re.toLowerCase().includes(termo))
      );
      renderizarTabela(filtrados);
      renderizarCards(filtrados);
    });
    
    document.getElementById('obraFilter').addEventListener('change', () => {
      const obraId = document.getElementById('obraFilter').value;
      const filtrados = obraId ? todosFuncionarios.filter(f => f.obraId === obraId) : todosFuncionarios;
      renderizarTabela(filtrados);
      renderizarCards(filtrados);
    });
    
    document.getElementById('importarBtn').onclick = () => alert('Importação em breve');
    document.getElementById('exportarBtn').onclick = () => alert('Exportação em breve');
    document.getElementById('apagarTodosBtn').onclick = () => {
      if (confirm('Excluir TODOS os funcionários?')) alert('Função em breve');
    };
    
    const modal = document.getElementById('modalFuncionario');
    window.fecharModalFuncionario = () => modal.style.display = 'none';
    document.getElementById('novoFuncionarioBtn').onclick = () => modal.style.display = 'flex';
    
    document.getElementById('formFuncionario').addEventListener('submit', async (e) => {
      e.preventDefault();
      const funcionario = {
        re: document.getElementById('re').value,
        nome: document.getElementById('nome').value,
        cargo: document.getElementById('cargo').value,
        setor: document.getElementById('setor').value,
        tipoVinculo: document.getElementById('tipoVinculo').value,
        obraId: document.getElementById('obraId').value,
        dataAdmissao: document.getElementById('dataAdmissao').value,
        nascimento: document.getElementById('nascimento').value,
        cbo: document.getElementById('cbo').value,
        exp30: document.getElementById('exp30').value,
        exp60: document.getElementById('exp60').value,
        salarioHora: parseFloat(document.getElementById('salarioHora').value) || 0,
        salarioMes: parseFloat(document.getElementById('salarioMes').value) || 0,
        situacao: document.getElementById('situacao').value,
        ativo: true
      };
      await addFuncionario(funcionario);
      modal.style.display = 'none';
      document.getElementById('formFuncionario').reset();
      await carregar();
    });
    
    await carregar();
  </script>
</body>
</html>
