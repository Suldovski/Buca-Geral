<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Obras · Bucagrans</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app"><div id="sidebar-slot"></div><main><div class="page-header"><h1>Obras</h1><button class="btn" id="novaObraBtn">+ Nova Obra</button></div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Localização</th><th>Funcionários</th><th>Ações</th></tr></thead><tbody id="tbodyObras"></tbody></table></div></main></div>
<div id="modalObra" class="modal"><div class="modal-content"><div class="modal-header"><h3>Nova Obra</h3><span class="close" onclick="fecharModal()">&times;</span></div><input type="text" id="nomeObra" class="input" placeholder="Nome" style="text-transform:uppercase"><input type="text" id="localizacaoObra" class="input" placeholder="Localização" style="text-transform:uppercase"><div class="dialog-foot"><button id="salvarObraBtn" class="btn">Salvar</button><button class="btn btn-outline" onclick="fecharModal()">Cancelar</button></div></div></div>
<script type="module">import { mountLayout, carregarObras, adicionarObra } from './app.js'; mountLayout('obras'); await carregarObras(); const modal = document.getElementById('modalObra'); window.fecharModal = () => modal.style.display = 'none'; document.getElementById('novaObraBtn').onclick = () => modal.style.display = 'flex'; document.getElementById('salvarObraBtn').onclick = async () => { await adicionarObra(document.getElementById('nomeObra').value, document.getElementById('localizacaoObra').value); fecharModal(); await carregarObras(); };</script>
</body></html>
