<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obras · Bucagrans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header">
        <h1>Obras</h1>
        <button class="btn" onclick="abrirModalNovaObra()">+ Nova Obra</button>
      </div>
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr><th>Nome</th><th>Localização</th><th>Funcionários</th><th>Ações</th></tr>
          </thead>
          <tbody id="tbodyObras"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modalNovaObra" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModalNovaObra()">&times;</span>
      <h3>Nova Obra</h3>
      <form id="formNovaObra">
        <div class="field"><label>Nome</label><input type="text" id="nomeObra" required style="text-transform: uppercase;"></div>
        <div class="field"><label>Localização</label><input type="text" id="localizacaoObra" required style="text-transform: uppercase;"></div>
        <div class="dialog-foot"><button type="submit" class="btn">Salvar</button><button type="button" class="btn btn-outline" onclick="fecharModalNovaObra()">Cancelar</button></div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    BG.mountLayout("obras");
    BG.carregarObras();

    function abrirModalNovaObra() { document.getElementById('modalNovaObra').style.display = 'flex'; }
    function fecharModalNovaObra() { document.getElementById('modalNovaObra').style.display = 'none'; }

    document.getElementById('formNovaObra').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('nomeObra').value.toUpperCase();
      const localizacao = document.getElementById('localizacaoObra').value.toUpperCase();
      await fetch('http://localhost:5000/api/obras', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, localizacao, dataInicio: new Date().toISOString(), ativo: true })
      });
      fecharModalNovaObra();
      BG.carregarObras();
    });
  </script>
</body>
</html>
