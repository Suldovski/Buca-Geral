<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Obras · Bucagrans</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="app"><div id="sidebar-slot"></div><main><div class="page-header"><h1>Obras</h1><button class="btn" id="novaObraBtn">+ Nova Obra</button></div>
<div class="table-wrap"><table><thead><tr><th>Nome</th><th>Localização</th><th>Funcionários</th><th>Ações</th></tr></thead><tbody id="tbodyObras"></tbody></table></div></main></div>
<div id="modalObra" class="modal"><div class="modal-content"><div class="modal-header"><h3>Nova Obra</h3><span class="close" onclick="fecharModal()">&times;</span></div><input type="text" id="nomeObra" class="input" placeholder="Nome" style="text-transform:uppercase"><input type="text" id="localizacaoObra" class="input" placeholder="Localização" style="text-transform:uppercase"><div class="dialog-foot"><button id="salvarObraBtn" class="btn">Salvar</button><button class="btn btn-outline" onclick="fecharModal()">Cancelar</button></div></div></div>
<div id="modalEditarObra" class="modal"><div class="modal-content"><div class="modal-header"><h3>Editar Obra</h3><span class="close" onclick="fecharModalEditar()">&times;</span></div><input type="hidden" id="editObraId"><input type="text" id="editNomeObra" class="input" placeholder="Nome" style="text-transform:uppercase"><input type="text" id="editLocalizacaoObra" class="input" placeholder="Localização" style="text-transform:uppercase"><div class="dialog-foot"><button id="atualizarObraBtn" class="btn">Salvar</button><button class="btn btn-outline" onclick="fecharModalEditar()">Cancelar</button></div></div></div>
<script type="module">import { mountLayout, carregarObras, adicionarObra, atualizarObra } from './app.js'; mountLayout('obras'); await carregarObras(); const modal = document.getElementById('modalObra'); const modalEdit = document.getElementById('modalEditarObra'); window.fecharModal = () => modal.style.display = 'none'; window.fecharModalEditar = () => modalEdit.style.display = 'none'; document.getElementById('novaObraBtn').onclick = () => modal.style.display = 'flex'; document.getElementById('salvarObraBtn').onclick = async () => { await adicionarObra(document.getElementById('nomeObra').value, document.getElementById('localizacaoObra').value); fecharModal(); await carregarObras(); }; document.getElementById('atualizarObraBtn').onclick = async () => { await atualizarObra(document.getElementById('editObraId').value, document.getElementById('editNomeObra').value, document.getElementById('editLocalizacaoObra').value); fecharModalEditar(); await carregarObras(); };</script>
</body></html>
