<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obras · Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header"><h1>Obras</h1><button class="btn" onclick="abrirModalObra()">+ Nova Obra</button></div>
      <div class="table-wrap"><table><thead><tr><th>Nome</th><th>Localização</th><th>Funcionários</th><th>Ações</th></tr></thead><tbody id="tbodyObras"></tbody></table></div>
    </main>
  </div>
  <div id="modalObra" class="modal"><div class="modal-content"><span class="close" onclick="fecharModalObra()">&times;</span><h3>Nova Obra</h3><form id="formObra"><div class="field"><label>Nome</label><input id="nomeObra" class="input" style="text-transform:uppercase" required></div><div class="field"><label>Localização</label><input id="localizacaoObra" class="input" style="text-transform:uppercase" required></div><div class="dialog-foot"><button type="submit" class="btn">Salvar</button><button type="button" class="btn btn-outline" onclick="fecharModalObra()">Cancelar</button></div></form></div></div>
  <script type="module">
    import { mountLayout, carregarObras, adicionarObra } from './app.js';
    mountLayout('obras');
    await carregarObras();
    window.abrirModalObra = () => document.getElementById('modalObra').style.display = 'flex';
    window.fecharModalObra = () => document.getElementById('modalObra').style.display = 'none';
    document.getElementById('formObra').addEventListener('submit', async (e) => {
      e.preventDefault();
      await adicionarObra(document.getElementById('nomeObra').value.toUpperCase(), document.getElementById('localizacaoObra').value.toUpperCase());
      fecharModalObra();
      await carregarObras();
    });
  </script>
</body>
</html>
