<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obras · Bucagrans</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .with-icon svg { width: 14px; height: 14px; margin-right: 4px; vertical-align: middle; }
    .cell-muted { vertical-align: middle; }
    .table-wrap table { width: 100%; border-collapse: collapse; }
    .table-wrap th, .table-wrap td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .table-wrap th { background: #f8fafc; font-weight: 600; color: #475569; }
    .table-wrap tr:hover { background: #f8fafc; }
    .search { max-width: 380px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main>
      <div class="page-header">
        <h1>Obras</h1>
        <button class="btn" onclick="openDialog('dlg-obra')">+ Nova obra</button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" class="input" placeholder="Buscar por nome ou localização" oninput="BG.renderObras()" />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Obra</th>
              <th>Localização</th>
              <th>Início</th>
              <th>Efetivo</th>
              <th>Status</th>
             </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div class="dialog-back" id="dlg-obra">
    <div class="dialog">
      <h2>Nova obra</h2>
      <form onsubmit="submitNovaObra(event)">
        <div class="field"><label>Nome</label><input class="input" name="nome" required placeholder="Ex: Residencial Vista Mar" /></div>
        <div class="field"><label>Localização</label><input class="input" name="localizacao" required placeholder="Ex: Santos, SP" /></div>
        <div class="row-2">
          <div class="field"><label>Início</label><input class="input" name="inicio" id="obra-inicio" placeholder="dd/mm/aaaa" /></div>
          <div class="field"><label>Status</label><select class="select" name="status"><option>Ativa</option><option>Encerrada</option></select></div>
        </div>
        <div class="dialog-foot"><button type="button" class="btn btn-outline" onclick="closeDialog('dlg-obra')">Cancelar</button><button type="submit" class="btn">Criar obra</button></div>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    BG.mountLayout("obras");
    document.getElementById("obra-inicio").value = BG.hojeBR();
    BG.renderObras();
  </script>
</body>
</html>
