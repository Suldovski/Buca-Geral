<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhe da Obra - Buca-Geral</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="header"><div class="logo">🏗️ Buca-Geral</div><div class="menu"><a href="home.html">Home</a><a href="obras.html">Obras</a><a href="rh-matriz.html">RH Matriz</a><a href="usuarios.html">Usuários</a><a href="index.html">Sair</a></div></div>
<div class="container"><div class="card"><div style="display: flex; justify-content: space-between; align-items: center;"><h2 id="obraNome"></h2><button class="btn btn-danger" onclick="excluirEstaObra()">🗑️ Excluir Obra</button></div>
<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"><button class="btn" onclick="abrirModalFuncionario()">➕ Novo Funcionário</button><button class="btn btn-success" onclick="abrirModalImportacao()">📥 Importar Planilha</button><button class="btn btn-primary" onclick="exportarExcel()">📤 Exportar para Excel</button><button class="btn btn-secondary" onclick="gerarPDF()">📄 Gerar PDF</button><a href="obras.html" class="btn btn-warning">← Voltar</a></div>
<div class="filtros"><div class="form-group"><input type="text" id="searchInput" placeholder="🔍 Buscar funcionário..."></div></div>
<table id="tabelaFunc"><thead><tr><th>Nome</th><th>Cargo</th><th>Salário</th><th>Admissão</th><th>Exp.30</th><th>Exp.60</th><th>Ações</th></tr></thead><tbody></tbody></table></div></div>
<div id="modalFunc" class="modal"><div class="modal-content"><span class="close" onclick="fecharModalFunc()">&times;</span><h3 id="modalFuncTitle">Novo Funcionário</h3><form id="funcForm"><input type="hidden" id="funcId"><div class="form-group"><label>Nome</label><input type="text" id="nome" required></div><div class="form-group"><label>Cargo</label><input type="text" id="cargo" required></div><div class="form-group"><label>Salário (R$)</label><input type="number" step="0.01" id="salario"></div><div class="form-group"><label>Data Admissão</label><input type="date" id="dataAdmissao" required></div><div class="form-group"><label>Exp.30 (exame)</label><input type="date" id="exp30"></div><div class="form-group"><label>Exp.60 (exame)</label><input type="date" id="exp60"></div><button type="submit" class="btn">Salvar</button></form></div></div>
<div id="modalImport" class="modal"><div class="modal-content"><span class="close" onclick="fecharModalImport()">&times;</span><h3>Importar Funcionários</h3><p>Colunas esperadas: Nome, Cargo, Salario, DataAdmissao, Exp30, Exp60</p><input type="file" id="fileExcel" accept=".xlsx"><button class="btn" onclick="importarExcel()">Importar</button><div id="importStatus"></div></div></div>
<script>
const API = 'http://localhost:5000/api';
const urlParams = new URLSearchParams(window.location.search);
const obraId = urlParams.get('id');
let funcionarios = [];
async function carregarObra() { const res = await fetch(`${API}/obras/${obraId}`); const obra = await res.json(); document.getElementById('obraNome').innerHTML = `👥 Funcionários - ${obra.nome}`; }
async function carregarFuncionarios() { const res = await fetch(`${API}/funcionarios`); const todos = await res.json(); funcionarios = todos.filter(f => f.obraId === obraId); renderizar(); }
function renderizar() { const busca = document.getElementById('searchInput').value.toLowerCase(); const filtrados = funcionarios.filter(f => f.nome.toLowerCase().includes(busca) || f.cargo.toLowerCase().includes(busca)); const tbody = document.querySelector('#tabelaFunc tbody'); tbody.innerHTML = ''; filtrados.forEach(f => { tbody.innerHTML += `<tr><td>${f.nome}</td><td>${f.cargo}</td><td>${f.salario ? 'R$ '+f.salario.toFixed(2) : '-'}</td><td>${new Date(f.dataAdmissao).toLocaleDateString()}</td><td>${f.exp30 ? new Date(f.exp30).toLocaleDateString() : '-'}</td><td>${f.exp60 ? new Date(f.exp60).toLocaleDateString() : '-'}</td><td><button class="btn btn-sm btn-warning" onclick="editarFuncionario('${f.id}')">Editar</button> <button class="btn btn-sm btn-danger" onclick="excluirFuncionario('${f.id}')">Excluir</button></td>`; }); }
function abrirModalFuncionario(id=null){ document.getElementById('modalFunc').style.display='flex'; if(id){ const f = funcionarios.find(x=>x.id===id); if(f){ document.getElementById('modalFuncTitle').innerText='Editar Funcionário'; document.getElementById('funcId').value=f.id; document.getElementById('nome').value=f.nome; document.getElementById('cargo').value=f.cargo; document.getElementById('salario').value=f.salario||''; document.getElementById('dataAdmissao').value=f.dataAdmissao.split('T')[0]; document.getElementById('exp30').value=f.exp30?.split('T')[0]||''; document.getElementById('exp60').value=f.exp60?.split('T')[0]||''; } }else{ document.getElementById('modalFuncTitle').innerText='Novo Funcionário'; document.getElementById('funcForm').reset(); document.getElementById('funcId').value=''; } }
function fecharModalFunc(){ document.getElementById('modalFunc').style.display='none'; }
async function salvarFuncionario(e){ e.preventDefault(); const id = document.getElementById('funcId').value; const func = { nome: document.getElementById('nome').value, cargo: document.getElementById('cargo').value, salario: parseFloat(document.getElementById('salario').value)||0, obraId, dataAdmissao: document.getElementById('dataAdmissao').value, exp30: document.getElementById('exp30').value||null, exp60: document.getElementById('exp60').value||null }; const method = id ? 'PUT' : 'POST'; const url = id ? `${API}/funcionarios/${id}` : `${API}/funcionarios`; const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(func) }); if(res.ok){ Swal.fire('Sucesso','Funcionário salvo!','success'); fecharModalFunc(); carregarFuncionarios(); } else Swal.fire('Erro','Não foi possível salvar','error'); }
async function editarFuncionario(id){ const f = funcionarios.find(x=>x.id===id); if(f) abrirModalFuncionario(id); }
async function excluirFuncionario(id){ const result = await Swal.fire({ title:'Tem certeza?', text:'Esta ação não pode ser desfeita!', icon:'warning', showCancelButton:true }); if(result.isConfirmed){ await fetch(`${API}/funcionarios/${id}`, { method:'DELETE' }); carregarFuncionarios(); Swal.fire('Excluído!','Funcionário removido.','success'); } }
function exportarExcel(){ const wsData = [['Nome','Cargo','Salário','Admissão','Exp30','Exp60']]; funcionarios.forEach(f => { wsData.push([f.nome, f.cargo, f.salario||'', new Date(f.dataAdmissao).toLocaleDateString(), f.exp30?new Date(f.exp30).toLocaleDateString():'', f.exp60?new Date(f.exp60).toLocaleDateString():'']); }); const ws = XLSX.utils.aoa_to_sheet(wsData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Funcionarios'); XLSX.writeFile(wb, `funcionarios_obra_${obraId}.xlsx`); }
function gerarPDF(){ const element = document.getElementById('tabelaFunc'); html2pdf().from(element).save(); }
function abrirModalImportacao(){ document.getElementById('modalImport').style.display='flex'; }
function fecharModalImport(){ document.getElementById('modalImport').style.display='none'; }
async function importarExcel(){ const file = document.getElementById('fileExcel').files[0]; if(!file){ Swal.fire('Erro','Selecione um arquivo','error'); return; } const data = await file.arrayBuffer(); const workbook = XLSX.read(data); const sheet = workbook.Sheets[workbook.SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(sheet); let importados=0; for(const row of rows){ const func = { nome: row.Nome, cargo: row.Cargo, salario: row.Salario||0, obraId, dataAdmissao: row.DataAdmissao, exp30: row.Exp30||null, exp60: row.Exp60||null }; await fetch(`${API}/funcionarios`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(func) }); importados++; } Swal.fire('Sucesso',`${importados} funcionários importados!`,'success'); fecharModalImport(); carregarFuncionarios(); }
async function excluirEstaObra(){ const result = await Swal.fire({ title:'Excluir obra?', text:'Todos os funcionários também serão removidos!', icon:'warning', showCancelButton:true }); if(result.isConfirmed){ await fetch(`${API}/obras/${obraId}`, { method:'DELETE' }); window.location.href='obras.html'; } }
document.getElementById('funcForm').addEventListener('submit', salvarFuncionario);
document.getElementById('searchInput').addEventListener('input', renderizar);
carregarObra(); carregarFuncionarios();
</script>
</body>
</html>
