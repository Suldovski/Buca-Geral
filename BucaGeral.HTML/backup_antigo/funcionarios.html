<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Buca-Geral - Funcionários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header"><div class="container" style="padding:0;"><h1>🏗️ Buca-Geral - Funcionários</h1><div class="menu"><a href="dashboard.html">Dashboard</a><a href="obras.html">Obras</a><a href="funcionarios.html">Funcionários</a><a href="index.html" style="background:#dc3545;">Sair</a></div></div></div>
<div class="container"><div class="card"><h2>👥 Funcionários</h2><button class="btn" onclick="abrirModal()">+ Novo Funcionário</button><hr style="margin:1rem 0"><table id="tabela"><thead><tr><th>Nome</th><th>Cargo</th><th>Obra</th><th>Admissão</th><th>Ações</th></tr></thead><tbody></tbody></table></div></div>
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;"><div style="background:white; padding:2rem; border-radius:16px; width:500px;"><span style="float:right; cursor:pointer" onclick="fecharModal()">&times;</span><h3 id="modalTitle">Novo Funcionário</h3><form id="funcForm"><input type="hidden" id="id"><div class="form-group"><label>Nome</label><input type="text" id="nome" required></div><div class="form-group"><label>Cargo</label><input type="text" id="cargo" required></div><div class="form-group"><label>Obra</label><select id="obraId" required></select></div><div class="form-group"><label>Data Admissão</label><input type="date" id="dataAdmissao" required></div><button type="submit" class="btn">Salvar</button></form></div></div>
<script>
    const apiFunc = 'http://localhost:5000/api/funcionarios';
    const apiObras = 'http://localhost:5000/api/obras';
    let funcionarios = [], obras = [];
    async function carregarObras(){ const res = await fetch(apiObras); obras = await res.json(); const select = document.getElementById('obraId'); select.innerHTML = '<option value="">Selecione uma obra</option>'; obras.forEach(o => { const opt = document.createElement('option'); opt.value = o.id; opt.textContent = o.nome; select.appendChild(opt); }); }
    async function carregar(){ const res = await fetch(apiFunc); funcionarios = await res.json(); const tbody = document.querySelector('#tabela tbody'); tbody.innerHTML = ''; for(const f of funcionarios){ const obraNome = obras.find(o=>o.id===f.obraId)?.nome || 'N/A'; const tr = document.createElement('tr'); tr.innerHTML = `<td>${f.nome}</td><td>${f.cargo}</td><td>${obraNome}</td><td>${new Date(f.dataAdmissao).toLocaleDateString()}</td><td><button class="btn btn-warning btn-sm" onclick="editar('${f.id}')">Editar</button> <button class="btn btn-danger btn-sm" onclick="excluir('${f.id}')">Excluir</button></td>`; tbody.appendChild(tr); } }
    function abrirModal(id=null){ document.getElementById('modal').style.display = 'flex'; if(id){ const f = funcionarios.find(x=>x.id===id); if(f){ document.getElementById('modalTitle').innerText='Editar Funcionário'; document.getElementById('id').value=f.id; document.getElementById('nome').value=f.nome; document.getElementById('cargo').value=f.cargo; document.getElementById('obraId').value=f.obraId; document.getElementById('dataAdmissao').value=f.dataAdmissao.split('T')[0]; } }else{ document.getElementById('modalTitle').innerText='Novo Funcionário'; document.getElementById('funcForm').reset(); document.getElementById('id').value=''; } }
    function fecharModal(){ document.getElementById('modal').style.display = 'none'; }
    async function salvar(e){ e.preventDefault(); const id = document.getElementById('id').value; const func = { nome: document.getElementById('nome').value, cargo: document.getElementById('cargo').value, obraId: document.getElementById('obraId').value, dataAdmissao: document.getElementById('dataAdmissao').value }; const method = id ? 'PUT' : 'POST'; const url = id ? `${apiFunc}/${id}` : apiFunc; await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(func) }); fecharModal(); carregar(); }
    async function editar(id){ await carregarObras(); abrirModal(id); }
    async function excluir(id){ if(confirm('Excluir funcionário?')){ await fetch(`${apiFunc}/${id}`, { method:'DELETE' }); carregar(); } }
    document.getElementById('funcForm').addEventListener('submit', salvar);
    carregarObras().then(()=>carregar());
</script>
</body>
</html>
